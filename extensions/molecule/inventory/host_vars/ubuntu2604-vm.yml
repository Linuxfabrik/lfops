ansible_user: 'root'

kvm_vm__autostart: false
kvm_vm__base_image: 'resolute-server-cloudimg-amd64.img'
kvm_vm__boot_disk_size: '20G'
kvm_vm__host: 'localhost'
kvm_vm__memory: 4096
kvm_vm__network_connections:
  - name: 'enp1s0'
    network_name: 'default'
    dhcp4: true
# libosinfo does not ship a dedicated 'ubuntu26.04' entry yet, so use the LTS-latest alias. It
# only seeds hypervisor hardware defaults (identical for recent Ubuntu) and starts resolving to
# 26.04 once libosinfo learns it.
kvm_vm__osinfo: 'ubuntu-lts-latest'
kvm_vm__packages: []
kvm_vm__vcpus: 2

molecule__vm_image_url: 'https://cloud-images.ubuntu.com/resolute/current/resolute-server-cloudimg-amd64.img'
