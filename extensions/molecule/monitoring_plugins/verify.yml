- name: 'Verify monitoring plugins are installed'
  hosts: 'systems_under_test'
  gather_facts: false
  tasks:
    - name: 'stat /usr/lib64/nagios/plugins/about-me'
      ansible.builtin.stat:
        path: '/usr/lib64/nagios/plugins/about-me'
      register: '__molecule__about_me_plugin_stat_result'

    - name: 'Assert that about-me monitoring plugin is installed'
      ansible.builtin.assert:
        that: '__molecule__about_me_plugin_stat_result["stat"]["exists"]'
