# Inputs for the system_update playbook (yum_utils + postfix + mailto_root +
# schedule_reboot + system_update).

# mailto_root is mandatory: a from and a list of recipients. A local address is
# enough; the test never sends real mail.
mailto_root__from: 'root@localhost'
mailto_root__to:
  - 'root@localhost'

# postfix needs a relayhost; an unreachable example host is fine.
postfix__relayhost: 'mail.example.com'

# Reboot window far from the test run, so neither the update nor the reboot
# timer fires mid-test.
schedule_reboot__reboot_time__group_var: '03:00'
