- name: 'Create container instances'
  hosts: 'systems_under_test'
  gather_facts: false
  tasks:
    - name: 'Create containers from inventory'
      containers.podman.podman_container:
        hostname: '{{ inventory_hostname }}'
        name: '{{ inventory_hostname }}'
        image: '{{ container_image }}'
        command: '{{ container_command | default("sleep 1d") }}'
        privileged: '{{ container_privileged | default(false) }}'
        volumes: '{{ container_volumes | default(omit) }}'
        capabilities: '{{ container_capabilities | default(omit) }}'
        systemd: '{{ container_systemd | default(false) }}'
        log_driver: '{{ container_log_driver | default("json-file") }}'
        state: 'started'
      register: 'create_result'
      delegate_to: 'localhost'

    # Not using ansible.builtin.wait_for_connection here as it depends on a working Python
    # installation inside the container; however, some container images are shipped with the
    # bare minimum and thus do not contain a Python interpreter.
    - name: 'Verify containers are running'
      ansible.builtin.include_tasks:
        file: 'tasks/create-fail.yml'
      when: >
        create_result.container.State.ExitCode != 0 or
        not create_result.container.State.Running
