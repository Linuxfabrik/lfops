- name: 'Create container instances'
  hosts: 'systems_under_test'
  gather_facts: false
  tasks:

    - name: 'Create containers from inventory'
      containers.podman.podman_container:
        capabilities: '{{ molecule__container_capabilities | default(omit) }}'
        command: '{{ molecule__container_command | default("sleep 1d") }}'
        hostname: '{{ inventory_hostname }}'
        image: '{{ molecule__container_image }}'
        log_driver: '{{ molecule__container_log_driver | default("json-file") }}'
        name: '{{ inventory_hostname }}'
        privileged: '{{ molecule__container_privileged | default(false) }}'
        state: 'started'
        systemd: '{{ molecule__container_systemd | default(false) }}'
        volumes: '{{ molecule__container_volumes | default(omit) }}'
      register: '__molecule__container_result'
      delegate_to: 'localhost'

    # Not using ansible.builtin.wait_for_connection here as it depends on a working Python
    # installation inside the container; however, some container images are shipped with the
    # bare minimum and thus do not contain a Python interpreter.
    - name: 'Verify containers are running'
      ansible.builtin.include_tasks:
        file: 'tasks/container-create-fail.yml'
      when: >
        __molecule__container_result['container']['State']['ExitCode'] != 0 or
        not __molecule__container_result['container']['State']['Running']
