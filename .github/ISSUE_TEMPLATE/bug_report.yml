name: 'Bug report'
description: 'Submit a bug report for LFOps'
labels:
  - 'bug'
body:
  - type: 'checkboxes'
    id: 'before-posting'
    attributes:
      label: 'Before submitting:'
      options:
        - label: 'I have searched existing issues to make sure this is not a duplicate.'
          required: true
        - label: 'I am using the latest release.'
          required: true
        - label: 'I agree to follow the [Code of Conduct](https://github.com/Linuxfabrik/lfops/blob/main/CODE_OF_CONDUCT.md).'
          required: true

  - type: 'textarea'
    id: 'bug-description'
    attributes:
      label: 'Bug description'
      description: 'Provide a clear and concise description of the bug.'
    validations:
      required: true

  - type: 'textarea'
    id: 'steps'
    attributes:
      label: 'Steps to reproduce'
      description: 'List the steps needed to reproduce the issue.'
    validations:
      required: true

  - type: 'textarea'
    id: 'expected'
    attributes:
      label: 'Expected behavior'
      description: 'What did you expect to happen?'

  - type: 'textarea'
    id: 'environment'
    attributes:
      label: 'Environment'
      description: 'Operating system, software version, and any other relevant details.'
    validations:
      required: true

  - type: 'textarea'
    id: 'additional'
    attributes:
      label: 'Additional context'
      description: 'Any other information, logs, or screenshots.'
