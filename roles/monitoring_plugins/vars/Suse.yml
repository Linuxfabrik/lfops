__monitoring_plugins__icinga_user: 'icinga'
__monitoring_plugins__package_version_separator: '-'
# SLE is not part of the LFOps compatibility matrix for the source install; the
# generic python3 is used and the >= 3.9 guard in linux-source.yml fails loudly
# on SLE 15 (system python3 is 3.6).
__monitoring_plugins__source_python_interpreter: 'python3'
__monitoring_plugins__source_python_packages: []
__monitoring_plugins__versionlock_lock_command: 'zypper addlock'
__monitoring_plugins__versionlock_unlock_command: 'zypper removelock'
