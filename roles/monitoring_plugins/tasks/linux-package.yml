- block:

  - name: 'install {{ __monitoring_plugins__versionlock_package }}'
    ansible.builtin.package:
      name:
        - '{{ __monitoring_plugins__versionlock_package }}'
      state: 'present'
    when: '__monitoring_plugins__versionlock_package is defined and __monitoring_plugins__versionlock_package | length > 0'

  - name: '{{ __monitoring_plugins__versionlock_unlock_command }} linuxfabrik-monitoring-plugins*'
    ansible.builtin.command: '{{ __monitoring_plugins__versionlock_unlock_command }} linuxfabrik-monitoring-plugins*'
    ignore_errors: true

  # block
  when:
    - 'not monitoring_plugins__skip_package_versionlock'

  tags:
    - 'monitoring_plugins'


- block:

  # refresh the apt cache so the following `state: latest` upgrade resolves
  # against current metadata, e.g. to roll out security updates. apt does not
  # auto-expire its cache the way dnf does, so without this the upgrade can
  # silently run against a stale cache and miss newer versions.
  - name: 'apt update # update the cache'
    ansible.builtin.apt:
      update_cache: true
    changed_when: false # refreshing the package cache is not a config change
    when: 'ansible_facts["os_family"] == "Debian"'

  - name: 'install linuxfabrik-monitoring-plugins{{ __monitoring_plugins__package_version_separator }}{{ monitoring_plugins__version }}*' # noqa package-latest
    ansible.builtin.package:
      name:
        - 'linuxfabrik-monitoring-plugins{{ __monitoring_plugins__package_version_separator }}{{ monitoring_plugins__version }}*'
      state: 'latest' # use latest for the versionlock after

  - name: 'install linuxfabrik-monitoring-plugins-selinux{{ __monitoring_plugins__package_version_separator }}{{ monitoring_plugins__version }}*' # noqa package-latest
    ansible.builtin.package:
      name:
        - 'linuxfabrik-monitoring-plugins-selinux{{ __monitoring_plugins__package_version_separator }}{{ monitoring_plugins__version }}*'
      state: 'latest' # use latest for the versionlock after
    when:
      - 'ansible_facts["os_family"] == "RedHat"'

  - name: 'Make sure sudoers drop-ins placed under earlier names are absent (each would duplicate the Cmnd_Alias of the packaged /etc/sudoers.d/linuxfabrik-monitoring-plugins)'
    ansible.builtin.file:
      # monitoring-plugins: the name the source install used before; icinga2-plugins: the manual
      # scp deployment documented in the monitoring-plugins README before the Ansible/package era.
      path: '/etc/sudoers.d/{{ item }}'
      state: 'absent'
    loop:
      - 'icinga2-plugins'
      - 'monitoring-plugins'

  tags:
    - 'monitoring_plugins'


- block:

  - name: '{{ __monitoring_plugins__versionlock_lock_command }} linuxfabrik-monitoring-plugins*'
    ansible.builtin.command: '{{ __monitoring_plugins__versionlock_lock_command }} linuxfabrik-monitoring-plugins*'

  # block
  when:
    - 'not monitoring_plugins__skip_package_versionlock'

  tags:
    - 'monitoring_plugins'
