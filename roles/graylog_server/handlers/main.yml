# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __graylog_server__service_state_result is registered on a dedicated state-only task (not the
# enabled task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags graylog_server:state`),
# where the result is never registered.
- name: 'graylog: restart graylog-server'
  ansible.builtin.systemd:
    name: 'graylog-server.service'
    state: 'restarted'
  when:
    - '__graylog_server__service_state_result is not defined or __graylog_server__service_state_result is not changed'
    - 'graylog_server__service_state != "stopped"'
