- block:

  - name: 'Validate that graylog_server__password_secret length >= 16 characters'
    ansible.builtin.assert:
      that:
        - 'graylog_server__password_secret | length >= 16'
      fail_msg: 'graylog_server__password_secret must be at least 16 characters'
      quiet: true

  tags:
    - 'always'


- block:

  - name: 'Install graylog-server'
    ansible.builtin.package:
      name:
        - 'graylog-server'
      state: 'present'

  tags:
    - 'graylog_server'


- block:

  - name: 'Set platform/version specific variables'
    ansible.builtin.import_role:
      name: 'shared'
      tasks_from: 'platform-variables.yml'

  - name: 'Get the list of installed packages'
    ansible.builtin.package_facts:  # yamllint disable-line rule:empty-values
    check_mode: false # run task even if `--check` is specified

  - name: 'Get Graylog version'
    ansible.builtin.set_fact:
      graylog_server__installed_version: '{{ ansible_facts["packages"]["graylog-server"][0]["version"] | regex_replace("\.\d+$", "") }}'

  - name: 'Deploy /etc/graylog/server/server.conf (version: {{ graylog_server__installed_version[:3] }})'
    ansible.builtin.template:
      backup: true
      src: 'etc/graylog/server/{{ graylog_server__installed_version[:3] }}-server.conf.j2'
      dest: '/etc/graylog/server/server.conf'
      owner: 'graylog'
      group: 'graylog'
      mode: 0o644
    notify: 'graylog: restart graylog-server'

  - name: 'Remove rpmnew / rpmsave (and Debian equivalents)'
    ansible.builtin.include_role:
      name: 'shared'
      tasks_from: 'remove-rpmnew-rpmsave.yml'
    vars:
      shared__remove_rpmnew_rpmsave_config_file: '/etc/graylog/server/server.conf'

  - name: 'Deploy {{ graylog_server__opts_file }}'
    ansible.builtin.template:
      backup: true
      src: '{{ graylog_server__opts_file[1:] }}.j2'
      dest: '{{ graylog_server__opts_file }}'
      owner: 'root'
      group: 'root'
      mode: 0o644
    notify: 'graylog: restart graylog-server'

  - name: 'mkdir -p {{ graylog_server__message_journal_dir }}'
    ansible.builtin.file:
      path: '{{ graylog_server__message_journal_dir }}'
      state: 'directory'
      owner: 'graylog'
      group: 'graylog'
      mode: 0o755

  tags:
    - 'graylog_server'
    - 'graylog_server:configure'


- block:

  - name: 'systemctl {{ graylog_server__service_enabled | bool | ternary("enable", "disable") }} --now graylog-server.service'
    ansible.builtin.systemd:
      name: 'graylog-server.service'
      enabled: '{{ graylog_server__service_enabled }}'
      state: '{{ graylog_server__service_enabled | bool | ternary("started", "stopped") }}'

  tags:
    - 'graylog_server'
    - 'graylog_server:state'


- block:

  - name: 'Wait for port {{ graylog_server__http_bind_port }} to become open on the host'
    ansible.builtin.wait_for:
      host: '{{ graylog_server__http_bind_address }}'
      port: '{{ graylog_server__http_bind_port }}'
      delay: 5

  - name: 'Check for Graylog first-time startup message in server.log'
    ansible.builtin.command: 'grep -A 2 "Initial configuration is accessible" /var/log/graylog-server/server.log'
    register: '__graylog_server__startup_message_result'
    ignore_errors: true
    changed_when: false # no actual config change

  - name: 'Graylog first-time startup message:'
    ansible.builtin.debug:
      var: '__graylog_server__startup_message_result["stdout_lines"]'
    when: '__graylog_server__startup_message_result["rc"] == 0'

  tags:
    - 'graylog_server'


- block:

  - name: 'Validate that each system input entry is global or assigned to a node'
    ansible.builtin.assert:
      that:
        - '(item["global"] | default(false) | bool) or (item["node"] | default("") | length > 0)'
      fail_msg: 'Each system input must set "global: true" or assign a "node", otherwise Graylog creates the input but never starts it'
      quiet: true
    loop: '{{ graylog_server__system_inputs__combined_var }}'
    loop_control:
      label: '{{ item["title"] | default(item["type"]) }}'
    when:
      - 'item["state"] | default("present") != "absent"'

  - name: 'Get all inputs'
    ansible.builtin.uri:
      url: 'http://{{ graylog_server__http_bind_address }}:{{ graylog_server__http_bind_port }}/api/system/inputs'
      user: '{{ graylog_server__root_user["username"] }}'
      password: '{{ graylog_server__root_user["password"] }}'
      method: 'GET'
      force_basic_auth: true
    register: '__graylog_server__inputs_result'
    changed_when: false # no actual config change
    check_mode: false # run task even if `--check` is specified

  - name: 'Graylog inputs:'
    ansible.builtin.debug:
      var: '__graylog_server__inputs_result["json"]["inputs"]'

  - name: 'Update existing inputs'
    ansible.builtin.uri:
      url: 'http://{{ graylog_server__http_bind_address }}:{{ graylog_server__http_bind_port }}/api/system/inputs/{{ __existing_id }}'
      user: '{{ graylog_server__root_user["username"] }}'
      password: '{{ graylog_server__root_user["password"] }}'
      method: 'PUT'
      body: '{{ (item
            | combine({"id": __existing_id})
            | dict2items
            | rejectattr("key", "equalto", "state")
            | items2dict)
          | to_json
        }}'
      force_basic_auth: true
      status_code: 201
      body_format: 'json'
      headers:
        Accept: 'application/json'
        X-Requested-By: 'cli'
    loop: '{{ graylog_server__system_inputs__combined_var }}'
    loop_control:
      label: '{{ item["title"] }}, state={{ item["state"] | default("present") }}'
    vars:
      __existing_id: '{{ __graylog_server__inputs_result["json"]["inputs"]
          | selectattr("title", "equalto", item["title"])
          | map(attribute="id")
          | first
        }}'
    when:
      - 'item["state"] | default("present") != "absent"'
      - '__graylog_server__inputs_result["json"]["inputs"] | selectattr("title", "equalto", item["title"]) | list | length > 0'

  - name: 'Create inputs'
    ansible.builtin.uri:
      url: 'http://{{ graylog_server__http_bind_address }}:{{ graylog_server__http_bind_port }}/api/system/inputs'
      user: '{{ graylog_server__root_user["username"] }}'
      password: '{{ graylog_server__root_user["password"] }}'
      method: 'POST'
      body: '{{ item | dict2items | rejectattr("key", "equalto", "state") | items2dict | to_json }}'
      force_basic_auth: true
      status_code: 201
      body_format: 'json'
      headers:
        Accept: 'application/json'
        X-Requested-By: 'cli'
    loop: '{{ graylog_server__system_inputs__combined_var }}'
    loop_control:
      label: '{{ item["title"] }}, state={{ item["state"] | default("present") }}'
    when:
      - 'item["state"] | default("present") != "absent"'
      - '__graylog_server__inputs_result["json"]["inputs"] | selectattr("title", "equalto", item["title"]) | list | length == 0'

  - name: 'Delete inputs'
    ansible.builtin.uri:
      url: 'http://{{ graylog_server__http_bind_address }}:{{ graylog_server__http_bind_port }}/api/system/inputs/{{ __existing_id }}'
      user: '{{ graylog_server__root_user["username"] }}'
      password: '{{ graylog_server__root_user["password"] }}'
      method: 'DELETE'
      force_basic_auth: true
      status_code: 204
      headers:
        X-Requested-By: 'cli'
    loop: '{{ graylog_server__system_inputs__combined_var }}'
    loop_control:
      label: '{{ item["title"] }}, state={{ item["state"] | default("present") }}'
    vars:
      __existing_id: '{{ __graylog_server__inputs_result["json"]["inputs"]
          | selectattr("title", "equalto", item["title"])
          | map(attribute="id")
          | first
        }}'
    when:
      - 'item["state"] | default("present") == "absent"'
      - '__graylog_server__inputs_result["json"]["inputs"] | selectattr("title", "equalto", item["title"]) | list | length > 0'

  when:
    - 'graylog_server__is_leader | bool' # only run this against one host, else we get duplicate inputs
  tags:
    - 'never'
    - 'graylog_server:configure_system_inputs'


- block:

  - name: 'Get all index sets'
    ansible.builtin.uri:
      url: 'http://{{ graylog_server__http_bind_address }}:{{ graylog_server__http_bind_port }}/api/system/indices/index_sets'
      user: '{{ graylog_server__root_user["username"] }}'
      password: '{{ graylog_server__root_user["password"] }}'
      method: 'GET'
      force_basic_auth: true
    register: '__graylog_server__index_sets_result'
    changed_when: false # no actual config change
    check_mode: false # run task even if `--check` is specified

  - name: 'Graylog index sets:'
    ansible.builtin.debug:
      var: '__graylog_server__index_sets_result["json"]["index_sets"]'

  - name: 'Update existing index sets'
    ansible.builtin.uri:
      url: 'http://{{ graylog_server__http_bind_address }}:{{ graylog_server__http_bind_port }}/api/system/indices/index_sets/{{ __existing_id }}'
      user: '{{ graylog_server__root_user["username"] }}'
      password: '{{ graylog_server__root_user["password"] }}'
      method: 'PUT'
      body: '{{ (item
            | combine({"id": __existing_id})
            | dict2items
            | rejectattr("key", "equalto", "state")
            | rejectattr("key", "equalto", "default")
            | items2dict)
          | to_json
        }}'
      force_basic_auth: true
      status_code: 200
      body_format: 'json'
      headers:
        Accept: 'application/json'
        X-Requested-By: 'cli'
    loop: '{{ graylog_server__system_index_sets__combined_var }}'
    loop_control:
      label: '{{ item["index_prefix"] }}, state={{ item["state"] | default("present") }}'
    vars:
      __existing_id: '{{ __graylog_server__index_sets_result["json"]["index_sets"]
          | selectattr("index_prefix", "equalto", item["index_prefix"])
          | map(attribute="id")
          | first
        }}'
    when:
      - 'item["state"] | default("present") != "absent"'
      - '__graylog_server__index_sets_result["json"]["index_sets"] | selectattr("index_prefix", "equalto", item["index_prefix"]) | list | length > 0'

  - name: 'Create index sets'
    ansible.builtin.uri:
      url: 'http://{{ graylog_server__http_bind_address }}:{{ graylog_server__http_bind_port }}/api/system/indices/index_sets'
      user: '{{ graylog_server__root_user["username"] }}'
      password: '{{ graylog_server__root_user["password"] }}'
      method: 'POST'
      body: '{{ item | dict2items | rejectattr("key", "equalto", "state") | rejectattr("key", "equalto", "default") | items2dict | to_json }}'
      force_basic_auth: true
      status_code: 200
      body_format: 'json'
      headers:
        Accept: 'application/json'
        X-Requested-By: 'cli'
    loop: '{{ graylog_server__system_index_sets__combined_var }}'
    loop_control:
      label: '{{ item["index_prefix"] }}, state={{ item["state"] | default("present") }}'
    when:
      - 'item["state"] | default("present") != "absent"'
      - '__graylog_server__index_sets_result["json"]["index_sets"] | selectattr("index_prefix", "equalto", item["index_prefix"]) | list | length == 0'

  - name: 'Delete index sets'
    ansible.builtin.uri:
      url: 'http://{{ graylog_server__http_bind_address }}:{{ graylog_server__http_bind_port }}/api/system/indices/index_sets/{{ __existing_id }}'
      user: '{{ graylog_server__root_user["username"] }}'
      password: '{{ graylog_server__root_user["password"] }}'
      method: 'DELETE'
      force_basic_auth: true
      status_code: 204
      headers:
        X-Requested-By: 'cli'
    loop: '{{ graylog_server__system_index_sets__combined_var }}'
    loop_control:
      label: '{{ item["index_prefix"] }}, state={{ item["state"] | default("present") }}'
    vars:
      __existing_id: '{{ __graylog_server__index_sets_result["json"]["index_sets"]
          | selectattr("index_prefix", "equalto", item["index_prefix"])
          | map(attribute="id")
          | first
        }}'
    when:
      - 'item["state"] | default("present") == "absent"'
      - '__graylog_server__index_sets_result["json"]["index_sets"] | selectattr("index_prefix", "equalto", item["index_prefix"]) | list | length > 0'

  - name: 'Re-read index sets after create/update/delete'
    ansible.builtin.uri:
      url: 'http://{{ graylog_server__http_bind_address }}:{{ graylog_server__http_bind_port }}/api/system/indices/index_sets'
      user: '{{ graylog_server__root_user["username"] }}'
      password: '{{ graylog_server__root_user["password"] }}'
      method: 'GET'
      force_basic_auth: true
    register: '__graylog_server__index_sets_result'
    changed_when: false # no actual config change
    check_mode: false # run task even if `--check` is specified

  - name: 'Set the default index set'
    ansible.builtin.uri:
      url: 'http://{{ graylog_server__http_bind_address }}:{{ graylog_server__http_bind_port }}/api/system/indices/index_sets/{{ __existing_id }}/default'
      user: '{{ graylog_server__root_user["username"] }}'
      password: '{{ graylog_server__root_user["password"] }}'
      method: 'PUT'
      force_basic_auth: true
      status_code: 200
      headers:
        X-Requested-By: 'cli'
    loop: '{{ graylog_server__system_index_sets__combined_var | selectattr("default", "defined") | selectattr("default", "eq", true) }}'
    loop_control:
      label: '{{ item["index_prefix"] }}'
    vars:
      __existing_id: '{{ __graylog_server__index_sets_result["json"]["index_sets"]
          | selectattr("index_prefix", "equalto", item["index_prefix"])
          | map(attribute="id")
          | first
        }}'
    when:
      - 'item["state"] | default("present") != "absent"'
      - '__graylog_server__index_sets_result["json"]["index_sets"] | selectattr("index_prefix", "equalto", item["index_prefix"]) | list | length > 0'

  when:
    - 'graylog_server__is_leader | bool' # only run this against one host, else we get duplicate index sets
  tags:
    - 'never'
    - 'graylog_server:configure_system_index_sets'
