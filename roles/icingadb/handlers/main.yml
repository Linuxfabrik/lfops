# Validation runs before the icinga2 restart: it is defined first, so when both
# are notified in the same flush it executes first, and it chains into the
# restart. `icinga2 daemon --validate` (-C) catches a broken icingadb feature
# config before the running daemon is bounced, so a bad deploy fails loudly here
# instead of leaving icinga2 down after the restart.
- name: 'icingadb: icinga2 daemon --validate'
  ansible.builtin.command: 'icinga2 daemon --validate'
  changed_when: true # must report changed so the chained restart handler is triggered
  notify: 'icingadb: restart icinga2'

# icinga2 is owned by the icinga2_master / icinga2_agent roles, not by this one, so there is no
# state task here whose result could tell us whether icinga2 was just started. Only
# lfops__skip_restart_handlers applies; the redundant-restart and stopped guards cannot be
# expressed here. Note that a restart deferred via that flag cannot be flushed through this role
# either, since icinga2 is not its service: use the icinga2_master role for that.
- name: 'icingadb: restart icinga2'
  ansible.builtin.service:
    name: 'icinga2'
    state: 'restarted'
  when:
    - 'not (lfops__skip_restart_handlers | d(false) | bool)'

# skip restart if the operator deferred restarts LFOps-wide (lfops__skip_restart_handlers), if
# the service was just started (redundant), or if the user wants it stopped.
# __icingadb__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags icingadb`), where the
# result is never registered.
- name: 'icingadb: restart icingadb'
  ansible.builtin.service:
    name: 'icingadb'
    state: 'restarted'
  when:
    - 'not (lfops__skip_restart_handlers | d(false) | bool)'
    - '__icingadb__service_state_result is not defined or __icingadb__service_state_result is not changed'
    - 'icingadb__service_state != "stopped"'
