# skip restart if the operator deferred restarts LFOps-wide (lfops__skip_restart_handlers), if
# the service was just started (redundant), or if the user wants it stopped.
# __mariadb_server__service_state_result is registered on a dedicated state-only task (not the
# enabled task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags mariadb_server:state`),
# where the result is never registered.
- name: 'mariadb_server: systemctl restart mariadb'
  ansible.builtin.service:
    name: 'mariadb.service'
    state: 'restarted'
  notify: 'mariadb_server: wait for port 3306 (for galera cluster)'
  when:
    - 'not (lfops__skip_restart_handlers | d(false) | bool)'
    - '__mariadb_server__service_state_result is not defined or __mariadb_server__service_state_result is not changed'
    - 'mariadb_server__state != "stopped"'
    - 'mariadb_server__run_galera_new_cluster is false'

- name: 'mariadb_server: wait for port 3306 (for galera cluster)'
  ansible.builtin.wait_for:
    host: '{{ mariadb_server__cnf_bind_address__combined_var if
        (mariadb_server__cnf_bind_address__combined_var | length
          and mariadb_server__cnf_bind_address__combined_var != "0.0.0.0")
        else "127.0.0.1" }}'
    port: 3306
    delay: 15
    sleep: 5
    timeout: 60
  when:
    - 'mariadb_server__cnf_wsrep_on is true'
