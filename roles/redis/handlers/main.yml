# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __redis__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags redis:state`), where
# the result is never registered.
- name: 'redis: restart redis'
  ansible.builtin.service:
    name: '{{ redis__service_name }}'
    state: 'restarted'
  when:
    - '__redis__service_state_result is not defined or __redis__service_state_result is not changed'
    - 'redis__service_state != "stopped"'
