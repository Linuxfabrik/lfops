# skip restart if the operator deferred restarts LFOps-wide (lfops__skip_restart_handlers), if
# the service was just started (redundant), or if the user wants it stopped.
# __bind__named_service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags bind:state`), where
# the result is never registered.
- name: 'bind: named-checkzone ... && reload named'
  ansible.builtin.command: 'named-checkzone {{ item["name"] }} /var/named/{{ item["file"] | d(item["name"] ~ ".zone") }}'
  loop: '{{ bind__zones }}'
  loop_control:
    label: '{{ item["name"] }}'
  when:
    - 'item["type"] | d("master") in ["primary", "master"]'
  notify:
    - 'bind: reload named'

- name: 'bind: reload named'
  ansible.builtin.service:
    state: 'reloaded'
    name: 'named'
  when:
    - '__bind__named_service_state_result is not defined or __bind__named_service_state_result is not changed'
    - 'bind__named_service_state != "stopped"'

- name: 'bind: restart named'
  ansible.builtin.service:
    state: 'restarted'
    name: 'named'
  when:
    - 'not (lfops__skip_restart_handlers | d(false) | bool)'
    - '__bind__named_service_state_result is not defined or __bind__named_service_state_result is not changed'
    - 'bind__named_service_state != "stopped"'
