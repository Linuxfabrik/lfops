# skip restart if the operator deferred restarts LFOps-wide (lfops__skip_restart_handlers), if
# the service was just started (redundant), or if the user wants it stopped.
# __systemd_journald__service_state_result is registered on a dedicated state-only task (not the
# enabled task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags systemd_journald:state`),
# where the result is never registered.
- name: 'systemd_journald: restart systemd-journald'
  ansible.builtin.systemd:
    name: 'systemd-journald'
    state: 'restarted'
  when:
    - 'not (lfops__skip_restart_handlers | d(false) | bool)'
    - '__systemd_journald__service_state_result is not defined or __systemd_journald__service_state_result is not changed'
    - 'systemd_journald__service_state != "stopped"'
