# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __influxdb__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags influxdb:state`), where
# the result is never registered.
- name: 'influxdb: restart influxdb'
  ansible.builtin.service:
    name: 'influxdb'
    state: 'restarted'
  when:
    - '__influxdb__service_state_result is not defined or __influxdb__service_state_result is not changed'
    - 'influxdb__service_state != "stopped"'
