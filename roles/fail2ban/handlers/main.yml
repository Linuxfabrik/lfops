# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __fail2ban__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags fail2ban:state`), where
# the result is never registered.
- name: 'fail2ban: restart fail2ban'
  ansible.builtin.service:
    name: 'fail2ban'
    state: 'restarted'
  when:
    - '__fail2ban__service_state_result is not defined or __fail2ban__service_state_result is not changed'
    - 'fail2ban__service_state != "stopped"'
