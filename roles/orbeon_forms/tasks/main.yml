- block:

  - name: 'Install unzip'
    ansible.builtin.package:
      name:
        - 'unzip'
      state: 'present'

  - name: 'Download Orbeon Forms zip to /tmp/'
    ansible.builtin.get_url:
      url: '{{ orbeon_forms__zip_url }}'
      dest: '/tmp/ansible.orbeon-{{ orbeon_forms__version }}-CE.zip'
      mode: 0o644

  - name: 'Extract orbeon.war from the Orbeon zip into /tmp/'
    ansible.builtin.command: >-
      unzip -j -o
      /tmp/ansible.orbeon-{{ orbeon_forms__version }}-CE.zip
      */orbeon.war
      -d /tmp/
    args:
      creates: '/tmp/orbeon.war'

  - name: 'mkdir -p {{ orbeon_forms__home }}'
    ansible.builtin.file:
      path: '{{ orbeon_forms__home }}'
      state: 'directory'
      owner: '{{ orbeon_forms__tomcat_user }}'
      group: '{{ orbeon_forms__tomcat_group }}'
      mode: 0o755

  - name: 'Explode orbeon.war into {{ orbeon_forms__home }}'
    ansible.builtin.unarchive:
      src: '/tmp/orbeon.war'
      dest: '{{ orbeon_forms__home }}/'
      remote_src: true
      creates: '{{ orbeon_forms__home }}/WEB-INF/web.xml'

  # Orbeon's log4j2.xml references log files via the relative path "../logs/orbeon.log",
  # which is meant to resolve to $CATALINA_BASE/logs. On RHEL Tomcat 10.1 the working
  # directory at log4j init is /usr/share/tomcat, so the relative path lands in
  # /usr/share/logs/ — a path the tomcat user can't create. Every FileAppender fails
  # and Orbeon's diagnostic output disappears, surfacing only as generic "Page Not Found"
  # responses. Rewriting the prefix to an absolute log dir fixes both. (The rst guide
  # documents the same workaround for Wildfly; on RHEL 10 Tomcat needs it too.)
  - name: 'Rewrite Orbeon log4j2.xml relative paths to absolute (../logs/ -> {{ orbeon_forms__log_dir }}/)'
    ansible.builtin.replace:
      path: '{{ orbeon_forms__home }}/WEB-INF/resources/config/log4j2.xml'
      regexp: '\.\./logs/'
      replace: '{{ orbeon_forms__log_dir }}/'

  - name: 'Deploy {{ orbeon_forms__tomcat_conf_dir }}/Catalina/localhost/orbeon.xml'
    ansible.builtin.template:
      backup: true
      src: 'usr/share/tomcat/conf/Catalina/localhost/orbeon.xml.j2'
      dest: '{{ orbeon_forms__tomcat_conf_dir }}/Catalina/localhost/orbeon.xml'
      owner: '{{ orbeon_forms__tomcat_user }}'
      group: '{{ orbeon_forms__tomcat_group }}'
      mode: 0o644

  - name: 'Symlink {{ orbeon_forms__numishare_dir }} -> {{ orbeon_forms__home }}/WEB-INF/resources/apps/numishare'
    ansible.builtin.file:
      src: '{{ orbeon_forms__numishare_dir }}'
      dest: '{{ orbeon_forms__home }}/WEB-INF/resources/apps/numishare'
      state: 'link'
      force: true

  # Numishare's xhtml templates hardcode `/ops/images/orbeon-icon-16.{ico,png}`,
  # a path Orbeon shipped in older versions but dropped in 2023.1 (the WAR no
  # longer carries `WEB-INF/resources/ops/` at all). Wire Numishare's own favicon
  # to the expected path so the references stop 404'ing without patching Numishare.
  - name: 'mkdir -p {{ orbeon_forms__home }}/WEB-INF/resources/ops/images'
    ansible.builtin.file:
      path: '{{ orbeon_forms__home }}/WEB-INF/resources/ops/images'
      state: 'directory'
      owner: '{{ orbeon_forms__tomcat_user }}'
      group: '{{ orbeon_forms__tomcat_group }}'
      mode: 0o755

  - name: 'Provide Numishare favicon at the path the xforms templates expect (/ops/images/orbeon-icon-16.{ico,png})'
    ansible.builtin.copy:
      src: '{{ orbeon_forms__numishare_dir }}/ui/images/favicon.{{ item["ext"] }}'
      dest: '{{ orbeon_forms__home }}/WEB-INF/resources/ops/images/orbeon-icon-16.{{ item["ext"] }}'
      remote_src: true
      owner: '{{ orbeon_forms__tomcat_user }}'
      group: '{{ orbeon_forms__tomcat_group }}'
      mode: 0o644
    loop:
      - {ext: 'ico'}
      - {ext: 'png'}
    loop_control:
      label: '{{ item["ext"] }}'

  - name: 'Find eXist-db XQJ-API jars in {{ orbeon_forms__numishare_dir }}/vendor/'
    ansible.builtin.find:
      paths: '{{ orbeon_forms__numishare_dir }}/vendor/exist-xqj-api-1.0.1'
      patterns: '*.jar'
    register: '__orbeon_forms__xqj_jars'

  - name: 'Copy eXist-db XQJ-API jars into {{ orbeon_forms__home }}/WEB-INF/lib/'
    ansible.builtin.copy:
      src: '{{ item["path"] }}'
      dest: '{{ orbeon_forms__home }}/WEB-INF/lib/{{ item["path"] | basename }}'
      remote_src: true
      owner: '{{ orbeon_forms__tomcat_user }}'
      group: '{{ orbeon_forms__tomcat_group }}'
      mode: 0o644
    loop: '{{ __orbeon_forms__xqj_jars["files"] }}'
    loop_control:
      label: '{{ item["path"] | basename }}'

  # ----------------------------------------------------------------------------
  # properties-local.xml: copy template if missing, then inject Numishare block
  # ----------------------------------------------------------------------------

  - name: 'cp properties-local.xml.template -> properties-local.xml (if missing)'
    ansible.builtin.copy:
      src: '{{ orbeon_forms__home }}/WEB-INF/resources/config/properties-local.xml.template'
      dest: '{{ orbeon_forms__home }}/WEB-INF/resources/config/properties-local.xml'
      remote_src: true
      owner: '{{ orbeon_forms__tomcat_user }}'
      group: '{{ orbeon_forms__tomcat_group }}'
      mode: 0o644
      force: false

  - name: 'Inject the Numishare block into properties-local.xml (between </property>...</properties>)'
    ansible.builtin.blockinfile:
      path: '{{ orbeon_forms__home }}/WEB-INF/resources/config/properties-local.xml'
      marker: '<!-- {mark} ANSIBLE MANAGED: Numishare properties -->'
      insertbefore: '</properties>'
      block: "{{ lookup('ansible.builtin.template', 'web-inf/resources/config/properties-local-numishare.xml.j2') }}"
      owner: '{{ orbeon_forms__tomcat_user }}'
      group: '{{ orbeon_forms__tomcat_group }}'
      mode: 0o644

  # ----------------------------------------------------------------------------
  # web.xml: inject Numishare login-config / security-constraint / themes mapping
  # ----------------------------------------------------------------------------

  # The Orbeon WAR ships with its own <login-config> and <session-config>. The web-app
  # schema permits only one of each, so we replace those blocks in place instead of
  # appending a second one.
  - name: 'Replace existing <login-config> in web.xml with the configured auth method ({{ orbeon_forms__auth_method }})'
    ansible.builtin.replace:
      path: '{{ orbeon_forms__home }}/WEB-INF/web.xml'
      regexp: '<login-config>[\s\S]*?</login-config>'
      replace: "{{ lookup('ansible.builtin.template', 'web-inf/login-config.xml.j2') }}"

  - name: 'Replace existing <session-config> in web.xml with Numishare session-timeout'
    ansible.builtin.replace:
      path: '{{ orbeon_forms__home }}/WEB-INF/web.xml'
      regexp: '<session-config>[\s\S]*?</session-config>'
      replace: |-
        <!-- ANSIBLE MANAGED: Numishare session-config -->
            <session-config>
                <session-timeout>{{ orbeon_forms__session_timeout }}</session-timeout>
            </session-config>

  - name: 'Inject the Numishare block into web.xml (before </web-app>)'
    ansible.builtin.blockinfile:
      path: '{{ orbeon_forms__home }}/WEB-INF/web.xml'
      marker: '<!-- {mark} ANSIBLE MANAGED: Numishare web.xml additions -->'
      insertbefore: '</web-app>'
      block: "{{ lookup('ansible.builtin.template', 'web-inf/web-numishare.xml.j2') }}"
      owner: '{{ orbeon_forms__tomcat_user }}'
      group: '{{ orbeon_forms__tomcat_group }}'
      mode: 0o644

  # ----------------------------------------------------------------------------
  # Themes: discovery (apps/themes -> /opt/themes) + delivery ($ORBEON/themes -> /opt/themes)
  # ----------------------------------------------------------------------------

  - name: 'Symlink {{ orbeon_forms__themes_dir }} -> {{ orbeon_forms__home }}/WEB-INF/resources/apps/themes'
    ansible.builtin.file:
      src: '{{ orbeon_forms__themes_dir }}'
      dest: '{{ orbeon_forms__home }}/WEB-INF/resources/apps/themes'
      state: 'link'
      force: true

  - name: 'Symlink {{ orbeon_forms__themes_dir }} -> {{ orbeon_forms__home }}/themes'
    ansible.builtin.file:
      src: '{{ orbeon_forms__themes_dir }}'
      dest: '{{ orbeon_forms__home }}/themes'
      owner: '{{ orbeon_forms__tomcat_user }}'
      group: '{{ orbeon_forms__tomcat_group }}'
      state: 'link'
      force: true

  - name: 'chown -R {{ orbeon_forms__tomcat_user }}:{{ orbeon_forms__tomcat_group }} {{ orbeon_forms__home }}'
    ansible.builtin.file:
      path: '{{ orbeon_forms__home }}'
      owner: '{{ orbeon_forms__tomcat_user }}'
      group: '{{ orbeon_forms__tomcat_group }}'
      recurse: true
      follow: false

  - name: 'systemctl restart tomcat.service'
    ansible.builtin.systemd:
      name: 'tomcat.service'
      state: 'restarted'

  tags:
    - 'orbeon_forms'
