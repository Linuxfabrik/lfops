# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __opensearch__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags opensearch:state`), where
# the result is never registered.
- name: 'opensearch: restart opensearch'
  ansible.builtin.service:
    name: 'opensearch'
    state: 'restarted'
  when:
    - '__opensearch__service_state_result is not defined or __opensearch__service_state_result is not changed'
    - 'opensearch__service_state != "stopped"'

- name: 'opensearch: /usr/share/opensearch/plugins/opensearch-security/tools/securityadmin.sh ...'
  ansible.builtin.command: >-
    /usr/share/opensearch/plugins/opensearch-security/tools/securityadmin.sh
    -cacert /etc/opensearch/root-ca.pem
    -cert /etc/opensearch/admin.pem
    -key /etc/opensearch/admin.key
    --configdir /etc/opensearch/opensearch-security
    --disable-host-name-verification
    --ignore-clustername
    --hostname '{{ opensearch__network_host }}'
  environment:
    JAVA_HOME: '/usr/share/opensearch/jdk'
  changed_when: true
