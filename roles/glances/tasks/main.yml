- block:

  # On RHEL 10 and clones glances is installed into a Python venv by the python_venv role, which the
  # playbook runs via the glances__python_venv__venvs__dependent_var injection (glances is not
  # packaged in EPEL 10). Everywhere else it comes from the distribution package.
  - name: 'Install glances'
    ansible.builtin.package:
      name:
        - 'glances'
      state: 'present'
    when:
      - 'not (ansible_facts["os_family"] == "RedHat" and ansible_facts["distribution_major_version"] | int >= 10)'

  - name: 'Deploy /etc/profile.d/glances.sh'
    ansible.builtin.template:
      backup: true
      src: 'etc/profile.d/glances.sh.j2'
      dest: '/etc/profile.d/glances.sh'
      owner: 'root'
      group: 'root'
      mode: 0o644

  tags:
    - 'glances'
