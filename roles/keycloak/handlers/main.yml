# skip restart if the operator deferred restarts LFOps-wide (lfops__skip_restart_handlers), if
# the service was just started (redundant), or if the user wants it stopped.
# __keycloak__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags keycloak:state`), where
# the result is never registered.
- name: 'keycloak: systemctl restart keycloak'
  ansible.builtin.service:
    name: 'keycloak.service'
    state: 'restarted'
  when:
    - 'not (lfops__skip_restart_handlers | d(false) | bool)'
    - '__keycloak__service_state_result is not defined or __keycloak__service_state_result is not changed'
    - 'keycloak__state != "stopped"'
