- block:

  - name: 'stat /opt/keycloak/.bootstrap_admin_done'
    ansible.builtin.stat:
      path: '/opt/keycloak/.bootstrap_admin_done'
    register: '__keycloak__bootstrap_marker'

  - name: 'Debug Variables'
    ansible.builtin.debug:
      msg: |
        keycloak__admin_login.username: {{ (keycloak__admin_login | d({}))["username"] | d("(bootstrap already done)") }}
        keycloak__db_login.username: {{ keycloak__db_login.username }}
        keycloak__db_url_database: {{ keycloak__db_url_database }}
        keycloak__db_url_host: {{ keycloak__db_url_host }}
        keycloak__db_vendor: {{ keycloak__db_vendor }}
        keycloak__expose_healthcheck_endpoints: {{ keycloak__expose_healthcheck_endpoints }}
        keycloak__expose_metrics_endpoints: {{ keycloak__expose_metrics_endpoints }}
        keycloak__hostname: {{ keycloak__hostname }}
        keycloak__hostname_backchannel_dynamic: {{ keycloak__hostname_backchannel_dynamic }}
        keycloak__https_certificate_file: {{ keycloak__https_certificate_file }}
        keycloak__https_certificate_key_file: {{ keycloak__https_certificate_key_file }}
        keycloak__https_protocols: {{ keycloak__https_protocols }}
        keycloak__log: {{ keycloak__log }}
        keycloak__log_file: {{ keycloak__log_file }}
        keycloak__mode: {{ keycloak__mode }}
        keycloak__proxy_headers: {{ keycloak__proxy_headers }}
        keycloak__service_enabled: {{ keycloak__service_enabled }}
        keycloak__spi_sticky_session_encoder_infinispan_should_attach_route: {{ keycloak__spi_sticky_session_encoder_infinispan_should_attach_route }}
        keycloak__state: {{ keycloak__state }}
        keycloak__version: {{ keycloak__version }}

  tags:
    - 'always'


- block:

  - name: 'Ensure group keycloak exists'
    ansible.builtin.group:
      name: 'keycloak'
      state: 'present'

  - name: 'Add the user keycloak with primary group of keycloak'
    ansible.builtin.user:
      name: 'keycloak'
      comment: 'User for Keycloak service'
      group: 'keycloak'

  - name: 'Create log directory "/var/log/keycloak"'
    ansible.builtin.file:
      path: '/var/log/keycloak'
      state: 'directory'
      owner: 'keycloak'
      group: 'keycloak'

  - name: 'mkdir /opt/keycloak'
    ansible.builtin.file:
      path: '/opt/keycloak'
      state: 'directory'
      owner: 'keycloak'
      group: 'keycloak'

  - name: 'Download and unpack archive'
    ansible.builtin.unarchive:
      src: 'https://github.com/keycloak/keycloak/releases/download/{{ keycloak__version }}/keycloak-{{ keycloak__version }}.tar.gz'
      dest: '/opt/keycloak'
      remote_src: true
      extra_opts:
        - '--strip-components=1'

  - name: 'chown -R keycloak:keycloak /opt/keycloak'
    ansible.builtin.file:
      path: '/opt/keycloak'
      state: 'directory'
      recurse: true
      owner: 'keycloak'
      group: 'keycloak'

  tags:
    - 'keycloak'


- block:

  - name: 'Create Keycloak config file'
    ansible.builtin.template:
      backup: true
      src: 'opt/keycloak/conf/keycloak.conf.j2'
      dest: '/opt/keycloak/conf/keycloak.conf'
      owner: 'keycloak'
      group: 'keycloak'
      mode: 0o640
    notify: 'keycloak: systemctl restart keycloak'

  - name: 'Configure sysconfig file for Keycloak service'
    ansible.builtin.template:
      backup: true
      src: 'etc/sysconfig/keycloak-sysconfig.j2'
      dest: '/etc/sysconfig/keycloak'
      owner: 'root'
      group: 'root'
      mode: 0o640
    vars:
      __keycloak__render_bootstrap_creds: '{{ not __keycloak__bootstrap_marker["stat"]["exists"] }}'
    notify: 'keycloak: systemctl restart keycloak'

  - name: 'Create keycloak.service'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/keycloak.service.j2'
      dest: '/etc/systemd/system/keycloak.service'
      owner: 'root'
      group: 'root'
      mode: 0o644
    notify: 'keycloak: systemctl restart keycloak'

  - name: 'systemctl daemon-reload'
    ansible.builtin.systemd:
      daemon_reload: true

  tags:
    - 'keycloak'
    - 'keycloak:configure'


- block:

  # kc.sh build always rebuilds and gives no reliable idempotency signal in its stdout, hence changed_when: true.
  - name: 'cd /opt/keycloak && bin/kc.sh build --db {{ keycloak__db_vendor }}'
    ansible.builtin.command: 'bin/kc.sh build --db {{ keycloak__db_vendor }}'
    args:
      chdir: '/opt/keycloak'
    become: true
    become_user: 'keycloak'
    changed_when: true
    when: 'keycloak__mode == "production"'

  tags:
    - 'keycloak'


- block:

  - name: 'systemctl {{ keycloak__service_enabled | bool | ternary("enable", "disable") }} keycloak.service'
    ansible.builtin.service:
      name: 'keycloak.service'
      enabled: '{{ keycloak__service_enabled }}'

  - name: 'systemctl {{ keycloak__state | regex_replace("p?ed$", "") }} keycloak.service'
    ansible.builtin.service:
      name: 'keycloak.service'
      state: '{{ keycloak__state }}'

  tags:
    - 'keycloak'
    - 'keycloak:configure'
    - 'keycloak:state'


- block:

  - name: 'Flush handlers so Keycloak restarts with the bootstrap credentials loaded'
    ansible.builtin.meta: 'flush_handlers'

  - name: 'Wait for Keycloak listener on port {{ __keycloak__listen_port }} (bootstrap admin gets provisioned during startup)'
    ansible.builtin.wait_for:
      port: '{{ __keycloak__listen_port }}'
      host: '127.0.0.1'
      timeout: 180
    vars:
      __keycloak__listen_port: '{{ (keycloak__https_certificate_file | d("") | length > 0) | ternary(8443, 8080) }}'

  - name: 'Deploy /etc/sysconfig/keycloak (without bootstrap credentials)'
    ansible.builtin.template:
      backup: true
      src: 'etc/sysconfig/keycloak-sysconfig.j2'
      dest: '/etc/sysconfig/keycloak'
      owner: 'root'
      group: 'root'
      mode: 0o640
    vars:
      __keycloak__render_bootstrap_creds: false

  - name: 'touch /opt/keycloak/.bootstrap_admin_done'
    ansible.builtin.file:
      path: '/opt/keycloak/.bootstrap_admin_done'
      state: 'touch'
      owner: 'keycloak'
      group: 'keycloak'
      mode: 0o644

  when:
    - 'not __keycloak__bootstrap_marker["stat"]["exists"]'
    - 'keycloak__state == "started"'

  tags:
    - 'keycloak'
    - 'keycloak:configure'
