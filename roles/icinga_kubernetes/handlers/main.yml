# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __icinga_kubernetes__service_state_result is registered on a dedicated state-only task (not the
# enabled task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags icinga_kubernetes`),
# where the result is never registered.
- name: 'icinga_kubernetes: restart icinga-kubernetes'
  ansible.builtin.service:
    name: 'icinga-kubernetes'
    state: 'restarted'
  when:
    - '__icinga_kubernetes__service_state_result is not defined or __icinga_kubernetes__service_state_result is not changed'
    - 'icinga_kubernetes__service_state != "stopped"'

- name: 'icinga_kubernetes: systemctl daemon reload && restart icinga-kubernetes'
  ansible.builtin.systemd:
    daemon_reload: true
  changed_when: true # else the next handler does not get called
  notify: 'icinga_kubernetes: restart icinga-kubernetes'
