argument_specs:
  main:
    options:

      freeipa_client__create_home_dir:
        type: 'bool'
        required: false
        default: true
        description: >-
          If `true`, configure PAM to create a user's home directory on
          first login if it does not exist.

      freeipa_client__ipa_admin_user:
        type: 'dict'
        required: false
        description: >-
          The IPA admin user / Kerberos admin principal used to enroll
          the client. Must contain the keys `username` (defaults to
          `admin`) and `password`. The password defaults to the Jinja
          expression `{{ freeipa_server__ipa_admin_password }}`, which
          is provided by the `freeipa_server` role's inventory.
          Typically fed by `linuxfabrik.lfops.bitwarden_item`, which
          returns the full Bitwarden item; extra keys are ignored.
