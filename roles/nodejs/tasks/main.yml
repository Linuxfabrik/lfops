- block:

  - name: 'Install nodejs'
    ansible.builtin.package:
      name:
        - 'nodejs'
      state: 'present'
    when: 'nodejs__dnf_module_stream is not defined or not (nodejs__dnf_module_stream | string | length > 0)'

  - name: 'Install @nodejs:{{ nodejs__dnf_module_stream }} -y'
    ansible.builtin.package:
      name:
        - '@nodejs:{{ nodejs__dnf_module_stream }}'
      state: 'present'
    when:
      - 'nodejs__dnf_module_stream is defined'
      - 'nodejs__dnf_module_stream | string | length > 0'

  - name: 'ln -s /bin/node /bin/nodejs'
    ansible.builtin.file:
      src: '/bin/node'
      dest: '/bin/nodejs'
      state: 'link'

  tags:
    - 'nodejs'
