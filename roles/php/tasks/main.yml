- name: 'Set platform/version specific variables'
  ansible.builtin.import_role:
    name: 'shared'
    tasks_from: 'platform-variables.yml'
  tags:
    - 'php'
    - 'php:fpm'
    - 'php:ini'
    - 'php:modules'
    - 'php:state'
    - 'php:update'


- block:

  - name: 'Install php php-fpm composer'
    ansible.builtin.package:
      name:
        - 'php'
        - 'php-fpm'
        - 'composer'
      state: 'present'

  tags:
    - 'php'


- block:

  - name: 'Update php php-fpm composer' # noqa package-latest (we explicitly want latest here)
    ansible.builtin.package:
      name:
        - 'php'
        - 'php-fpm'
        - 'composer'
      state: 'latest'
    notify: 'php: restart php-fpm'

  tags:
    - 'never'
    - 'php:update'


- block:

  - name: 'Get the list of installed packages'
    ansible.builtin.package_facts:  # yamllint disable-line rule:empty-values
    check_mode: false # run task even if `--check` is specified

  - name: 'Get PHP version'
    ansible.builtin.set_fact:
      __php__installed_version: '{{ ansible_facts["packages"]["php"][0]["version"] | regex_search("\d\.\d") }}'

  tags:
    - 'php'
    - 'php:fpm'
    - 'php:ini'
    - 'php:modules'
    - 'php:update'


- block:

  - name: 'Combined Modules:'
    ansible.builtin.debug:
      var: 'php__modules__combined_var'

  - name: 'Ensure PHP modules are absent'
    # providing the packages as a list is much more faster than looping for each
    ansible.builtin.package:
      name: '{{ php__modules__combined_var | selectattr("state", "defined") | selectattr("state", "eq", "absent") | map(attribute="name") }}'
      state: 'absent'

  - name: 'Ensure PHP modules are present'
    # providing the packages as a list is much more faster than looping for each
    ansible.builtin.package:
      name: '{{ (php__modules__combined_var | selectattr("state", "defined") | selectattr("state", "ne", "absent") | map(attribute="name"))
          + (php__modules__combined_var | selectattr("state", "undefined") | map(attribute="name")) }}'
      state: 'present'

  tags:
    - 'php'
    - 'php:modules'


- block:

  - name: 'Combined Modules:'
    ansible.builtin.debug:
      var: 'php__modules__combined_var'

  - name: 'Update PHP modules' # noqa package-latest (we explicitly want latest here)
    # providing the packages as a list is much more faster than looping for each
    ansible.builtin.package:
      name: '{{ (php__modules__combined_var | selectattr("state", "defined") | selectattr("state", "ne", "absent") | map(attribute="name"))
          + (php__modules__combined_var | selectattr("state", "undefined") | map(attribute="name")) }}'
      state: 'latest'
    notify: 'php: restart php-fpm'

  tags:
    - 'never'
    - 'php:update'


- block:

  - name: 'Load default values for {{ __php__installed_version }}'
    ansible.builtin.include_vars: 'vars/{{ __php__installed_version }}.yml'

  - name: 'Deploy the PHP configs'
    ansible.builtin.template:
      backup: true
      src: 'etc/php.d/{{ __php__installed_version }}-z00-linuxfabrik.ini.j2'
      dest: '{{ item }}'
      owner: 'root'
      group: 'root'
      mode: 0o644
    loop: '{{ __php__conf_dest }}'
    notify: 'php: restart php-fpm'

  tags:
    - 'php'
    - 'php:ini'
    - 'php:update'


- block:

  # opcache is shared among all php-fpm pools, so a single shared directory is
  # enough. On RedHat the package ships it; create it for parity on Debian.
  - name: 'Ensure the shared opcache directory {{ __php__fpm_opcache_path }} exists'
    ansible.builtin.file:
      path: '{{ __php__fpm_opcache_path }}'
      state: 'directory'
      owner: 'root'
      group: '{{ __shared__apache_httpd_group }}'
      mode: 0o770

  # php-fpm writes the per-pool error_log and slowlog into this directory but does
  # not create it itself. On RedHat the package ships /var/log/php-fpm; create it
  # for parity on Debian, where the package only ships a single
  # /var/log/<service>.log file.
  - name: 'Ensure the php-fpm log directory /var/log/{{ __php__fpm_service_name }} exists'
    ansible.builtin.file:
      path: '/var/log/{{ __php__fpm_service_name }}'
      state: 'directory'
      owner: '{{ __shared__apache_httpd_user }}'
      group: 'root'
      mode: 0o770

  # each pool gets its own session directory below the distro's session base, so
  # the pools cannot read each other's sessions. On RedHat this inherits the
  # `httpd_var_run_t` SELinux type from the parent; on Debian the packaged
  # `sessionclean` timer recurses the base and reaps stale files.
  - name: 'Create the per-pool session directories'
    ansible.builtin.file:
      path: '{{ item["php_admin_value_session_save_path"] | d(__php__fpm_session_path ~ "/" ~ item["name"]) }}'
      state: 'directory'
      owner: '{{ item["user"] | d(__shared__apache_httpd_user) }}'
      group: '{{ item["group"] | d(__shared__apache_httpd_group) }}'
      mode: 0o700
    when:
      - 'item["state"] | d("present") != "absent"'
    loop: '{{ php__fpm_pools__combined_var }}'

  - name: 'restorecon -Fvr {{ __php__fpm_session_path }} {{ __php__fpm_opcache_path }}'
    ansible.builtin.command: 'restorecon -Fvr {{ __php__fpm_session_path }} {{ __php__fpm_opcache_path }}'
    register: '__php__restorecon_result'
    changed_when: '__php__restorecon_result["stdout"] | length > 0'
    when:
      - 'ansible_facts["os_family"] == "RedHat"'
      - 'ansible_facts["selinux"]["status"] != "disabled"'

  - name: 'Remove absent pools from {{ __php__fpm_pools_path }}'
    ansible.builtin.file:
      path: '{{ __php__fpm_pools_path }}/{{ item["name"] }}.conf'
      state: 'absent'
    when:
      - 'item["state"] | d("present") == "absent"'
    loop: '{{ php__fpm_pools__combined_var }}'
    notify: 'php: restart php-fpm'

  - name: 'Deploy the pools to {{ __php__fpm_pools_path }}'
    ansible.builtin.template:
      backup: true
      src: 'etc/php-fpm.d/pool.conf.j2'
      dest: '{{ __php__fpm_pools_path }}/{{ item["name"] }}.conf'
      owner: 'root'
      group: 'root'
      mode: 0o644
    when:
      - 'item["state"] | d("present") != "absent"'
    loop: '{{ php__fpm_pools__combined_var }}'
    notify: 'php: restart php-fpm'

  # On Debian the packaged logrotate config only covers the single
  # /var/log/<service>.log file, not the per-pool logs in the directory above, so
  # ship our own. On RedHat the package's /etc/logrotate.d/php-fpm already rotates
  # /var/log/php-fpm/*log.
  - name: 'Deploy /etc/logrotate.d/linuxfabrik-php-fpm'
    ansible.builtin.template:
      backup: true
      src: 'etc/logrotate.d/linuxfabrik-php-fpm.j2'
      dest: '/etc/logrotate.d/linuxfabrik-php-fpm'
      owner: 'root'
      group: 'root'
      mode: 0o644
    when:
      - 'ansible_facts["os_family"] == "Debian"'

  tags:
    - 'php'
    - 'php:fpm'


- block:

  - name: 'systemctl {{ php__fpm_service_enabled | bool | ternary("enable", "disable") }} --now {{ __php__fpm_service_name }}'
    ansible.builtin.service:
      name: '{{ __php__fpm_service_name }}'
      enabled: '{{ php__fpm_service_enabled }}'
      state: '{{ php__fpm_service_enabled | bool | ternary("started", "stopped") }}'

  tags:
    - 'php'
    - 'php:state'
