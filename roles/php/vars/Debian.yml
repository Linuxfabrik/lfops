__php__conf_dest:
  - '/etc/php/{{ __php__installed_version }}/apache2/conf.d/z00-linuxfabrik.ini'
  - '/etc/php/{{ __php__installed_version }}/cli/conf.d/z00-linuxfabrik.ini'
  - '/etc/php/{{ __php__installed_version }}/fpm/conf.d/z00-linuxfabrik.ini'
__php__fpm_opcache_path: '/var/lib/php/opcache'
__php__fpm_pools_path: '/etc/php/{{ __php__installed_version }}/fpm/pool.d'
__php__fpm_runtime_path: '/run/php'
__php__fpm_service_name: 'php{{ __php__installed_version }}-fpm'
__php__fpm_session_path: '/var/lib/php/sessions'
