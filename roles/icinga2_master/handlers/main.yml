# Validation runs before the restart: it is defined first, so when both are
# notified in the same flush it executes first, and it chains into the restart.
# `icinga2 daemon --validate` (-C) catches a broken config before the running
# daemon is bounced, so a bad deploy fails loudly here instead of leaving icinga2
# down after the restart.
- name: 'icinga2_master: icinga2 daemon --validate'
  ansible.builtin.command: 'icinga2 daemon --validate'
  changed_when: true # must report changed so the chained restart handler is triggered
  notify: 'icinga2_master: restart icinga2'

# skip restart if the operator deferred restarts LFOps-wide (lfops__skip_restart_handlers), if
# the service was just started (redundant), or if the user wants it stopped.
# __icinga2_master__service_state_result is registered on a dedicated state-only task (not the
# enabled task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags icinga2_master:state`),
# where the result is never registered.
- name: 'icinga2_master: restart icinga2'
  ansible.builtin.service:
    name: 'icinga2'
    state: 'restarted'
  when:
    - 'not (lfops__skip_restart_handlers | d(false) | bool)'
    - '__icinga2_master__service_state_result is not defined or __icinga2_master__service_state_result is not changed'
    - 'icinga2_master__service_state != "stopped"'
