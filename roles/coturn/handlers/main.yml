# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __coturn__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags coturn:state`), where
# the result is never registered.
- name: 'coturn: restart coturn'
  ansible.builtin.service:
    name: 'coturn'
    state: 'restarted'
  when:
    - '__coturn__service_state_result is not defined or __coturn__service_state_result is not changed'
    - 'coturn__service_state != "stopped"'
