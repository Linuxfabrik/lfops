# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __rsyslog__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags rsyslog:state`), where
# the result is never registered.
- name: 'rsyslog: restart rsyslog'
  ansible.builtin.service:
    name: 'rsyslog'
    state: 'restarted'
  when:
    - '__rsyslog__service_state_result is not defined or __rsyslog__service_state_result is not changed'
    - 'rsyslog__service_state != "stopped"'
