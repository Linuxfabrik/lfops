# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __apache_solr__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags apache_solr:state`), where
# the result is never registered.
- name: 'apache_solr: restart solr.service'
  ansible.builtin.service:
    name: 'solr.service'
    state: 'restarted'
  when:
    - '__apache_solr__service_state_result is not defined or __apache_solr__service_state_result is not changed'
    - 'apache_solr__service_state != "stopped"'
