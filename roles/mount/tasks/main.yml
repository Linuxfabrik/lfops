- name: 'Set platform/version specific variables'
  ansible.builtin.import_role:
    name: 'shared'
    tasks_from: 'platform-variables.yml'
  tags:
    - 'mount'


- block:

  - name: 'Combined Mounts'
    ansible.builtin.debug:
      var: 'mount__mounts__combined_var'

  - name: 'Install {{ mount__nfs_client_package }}'
    ansible.builtin.package:
      name: '{{ mount__nfs_client_package }}'
      state: 'present'
    when:
      - '((mount__mounts__combined_var | selectattr("state", "defined") | selectattr("state", "ne", "absent") | list)
          + (mount__mounts__combined_var | selectattr("state", "undefined") | list))
          | selectattr("fstype", "equalto", "nfs") | list | length > 0'

  - name: 'Install {{ mount__cifs_client_package }}'
    ansible.builtin.package:
      name: '{{ mount__cifs_client_package }}'
      state: 'present'
    when:
      - '((mount__mounts__combined_var | selectattr("state", "defined") | selectattr("state", "ne", "absent") | list)
          + (mount__mounts__combined_var | selectattr("state", "undefined") | list))
          | selectattr("fstype", "equalto", "cifs") | list | length > 0'

  - name: 'mkdir -p mount-point'
    ansible.builtin.file:
      path: '{{ item["path"] }}'
      state: 'directory'
      owner: '{{ item["owner"] | d("root") }}'
      group: '{{ item["group"] | d("root") }}'
      mode: 0o755
    loop: '{{ mount__mounts__combined_var }}'

  - name: 'Mount volumes'
    ansible.posix.mount:
      path: '{{ item["path"] }}'
      src: '{{ item["src"] }}'
      opts: '{{ item["opts"] | d(omit) }}'
      state: '{{ item["state"] | d("mounted") }}'
      fstype: '{{ item["fstype"] }}'
    loop: '{{ mount__mounts__combined_var }}'

  tags:
    - 'mount'
