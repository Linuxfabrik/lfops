- block:

  - name: 'Set platform/version specific variables'
    ansible.builtin.import_role:
      name: 'shared'
      tasks_from: 'platform-variables.yml'

  - name: 'Deploy /etc/ssh/sshd_config'
    ansible.builtin.template:
      backup: true
      src: '{{ lookup("ansible.builtin.first_found", __sshd__sshd_config_template_file) }}'
      dest: '/etc/ssh/sshd_config'
      owner: 'root'
      group: 'root'
      mode: 0o600
    vars:
      __sshd__sshd_config_template_file:
        files:
          # most specific (distribution + major version, e.g. Ubuntu24) first, then
          # os_family + major version (e.g. RedHat9, Debian13), then the os_family
          # fallback (e.g. RedHat) which covers Fedora, where we do not ship a
          # template per release.
          - 'etc/ssh/{{ ansible_facts["distribution"] }}{{ ansible_facts["distribution_major_version"] }}-sshd_config.j2'
          - 'etc/ssh/{{ ansible_facts["os_family"] }}{{ ansible_facts["distribution_major_version"] }}-sshd_config.j2'
          - 'etc/ssh/{{ ansible_facts["os_family"] }}-sshd_config.j2'
        paths:
          - '{{ role_path }}/templates'
    notify: 'sshd: sshd -t; reload sshd'

  - name: 'Remove rpmnew / rpmsave (and Debian equivalents)'
    ansible.builtin.include_role:
      name: 'shared'
      tasks_from: 'remove-rpmnew-rpmsave.yml'
    vars:
      shared__remove_rpmnew_rpmsave_config_file: '/etc/ssh/sshd_config'

  - name: 'semanage port --add --type ssh_port_t --proto tcp {{ sshd__port }}'
    community.general.seport:
      ports: '{{ sshd__port }}'
      proto: 'tcp'
      setype: 'ssh_port_t'
    when:
      - 'ansible_facts["selinux"]["status"] != "disabled"'

  tags:
    - 'sshd'


- block:

  # On Debian/Ubuntu, OpenSSH ships socket activation (ssh.socket) enabled by
  # default, and the daemon unit is ssh.service (sshd.service is only an alias
  # that exists once ssh.service has been enabled). This role manages the daemon
  # through its service unit like on RHEL, so disable the socket first to avoid
  # both ssh.socket and ssh.service binding the SSH port.
  - name: 'systemctl disable --now ssh.socket'
    ansible.builtin.systemd:
      name: 'ssh.socket'
      enabled: false
      state: 'stopped'
    when:
      - 'ansible_facts["os_family"] == "Debian"'

  - name: 'systemctl: {{ __sshd__service_name }} enabled = {{ sshd__service_enabled }}'
    ansible.builtin.systemd:
      name: '{{ __sshd__service_name }}.service'
      enabled: '{{ sshd__service_enabled }}'

  - name: 'systemctl {{ sshd__service_state | regex_replace("p?ed$", "") }} {{ __sshd__service_name }}.service'
    ansible.builtin.systemd:
      name: '{{ __sshd__service_name }}.service'
      state: '{{ sshd__service_state }}'
    register: '__sshd__service_state_result'

  tags:
    - 'sshd'
    - 'sshd:state'
