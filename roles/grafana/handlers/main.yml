# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __grafana__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags grafana:state`), where
# the result is never registered.
- name: 'grafana: restart grafana-server'
  ansible.builtin.systemd:
    name: 'grafana-server.service'
    state: 'restarted'
  when:
    - '__grafana__service_state_result is not defined or __grafana__service_state_result is not changed'
    - 'grafana__service_state != "stopped"'
