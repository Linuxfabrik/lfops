- block:

  # send via sendmail (provided by postfix), so the role needs no mailx package
  # and one invocation works across distros (mailx's -r / -a "From:" split does
  # not). -t reads the recipient from the To: header. changed_when: false because
  # sending a verification mail does not change managed system state.
  - name: 'Send test mail to internal root (should be delivered to {{ mailto_root__to }})'
    ansible.builtin.shell: |
      set -o pipefail
      {
          printf 'From: %s\n' '{{ mailto_root__from }}'
          printf 'To: root\n'
          printf 'Subject: Test from %s to root\n' "$(hostname)"
          printf '\nTestmail\n'
      } | /usr/sbin/sendmail -oi -t -f '{{ mailto_root__from }}'
    args:
      executable: '/usr/bin/bash'
    changed_when: false

  - name: 'Send test mail to {{ mailto_root__to[0] }}'
    ansible.builtin.shell: |
      set -o pipefail
      {
          printf 'From: %s\n' '{{ mailto_root__from }}'
          printf 'To: %s\n' '{{ mailto_root__to[0] }}'
          printf 'Subject: Test from %s to %s\n' "$(hostname)" '{{ mailto_root__to[0] }}'
          printf '\nTestmail\n'
      } | /usr/sbin/sendmail -oi -t -f '{{ mailto_root__from }}'
    args:
      executable: '/usr/bin/bash'
    changed_when: false

  tags:
    - 'mailto_root'
