- block:

  - name: 'Store the github release version'
    ansible.builtin.set_fact:
      glpi_agent__github_version: '{{ glpi_agent__version }}'
    when: 'glpi_agent__version != "latest"'

  - block:

    - name: 'Get latest glpi_agent release version'
      ansible.builtin.uri:
        url: 'https://api.github.com/repos/glpi-project/glpi-agent/releases/latest'
      register: 'glpi_agent__github_release'
      check_mode: false # run task even if `--check` is specified
      delegate_to: 'localhost'
      become: false
      run_once: true

    - name: 'Store the latest release version'
      ansible.builtin.set_fact:
        glpi_agent__github_version: '{{ glpi_agent__github_release["json"]["tag_name"] }}'

    # block
    when: 'glpi_agent__version == "latest"'

  - name: 'curl --location https://github.com/glpi-project/glpi-agent/releases/download/{{ glpi_agent__github_version }}/glpi-agent-{{ glpi_agent__github_version }}-1.noarch.rpm'
    ansible.builtin.get_url:
      url: 'https://github.com/glpi-project/glpi-agent/releases/download/{{ glpi_agent__github_version }}/glpi-agent-{{ glpi_agent__github_version }}-1.noarch.rpm'
      dest: '/tmp/ansible.glpi-agent-{{ glpi_agent__github_version }}-1.noarch.rpm'
      mode: 0o644
    delegate_to: 'localhost'
    become: false
    changed_when: false # not an actual config change on the server
    check_mode: false # run task even if `--check` is specified

  - name: 'copy /tmp/ansible.glpi-agent-{{ glpi_agent__github_version }}-1.noarch.rpm to remote server'
    ansible.builtin.copy:
      src: '/tmp/ansible.glpi-agent-{{ glpi_agent__github_version }}-1.noarch.rpm'
      dest: '/tmp/ansible.glpi-agent-{{ glpi_agent__github_version }}-1.noarch.rpm'
      owner: 'root'
      group: 'root'
      mode: 0o755
    changed_when: false # not an actual config change on the server

  - name: 'dnf install /tmp/ansible.glpi-agent-{{ glpi_agent__github_version }}-1.noarch.rpm'
    ansible.builtin.dnf:
      name: '/tmp/ansible.glpi-agent-{{ glpi_agent__github_version }}-1.noarch.rpm'
      disable_gpg_check: true # rpm is not signed

  - name: 'rm /tmp/ansible.glpi-agent-{{ glpi_agent__github_version }}-1.noarch.rpm'
    ansible.builtin.file:
      path: '/tmp/ansible.glpi-agent-{{ glpi_agent__github_version }}-1.noarch.rpm'
      state: 'absent'
    changed_when: false # not an actual config change on the server

  tags:
    - 'glpi_agent'


- block:

  - name: 'Deploy /etc/glpi-agent/conf.d/z00-linuxfabrik.cfg'
    ansible.builtin.template:
      backup: true
      src: 'etc/glpi-agent/conf.d/z00-linuxfabrik.cfg.j2'
      dest: '/etc/glpi-agent/conf.d/z00-linuxfabrik.cfg'
      owner: 'root'
      group: 'root'
      mode: 0o640
    notify: 'glpi_agent: restart glpi-agent'

  tags:
    - 'glpi_agent'
    - 'glpi_agent:configure'


- block:

  - name: 'Assert that the database inventory credentials are set'
    ansible.builtin.assert:
      that:
        - 'glpi_agent__database_inventory_credentials | length > 0'
      fail_msg: 'glpi_agent__database_inventory_credentials must be set when glpi_agent__database_inventory_enabled is true.'
    when: 'glpi_agent__database_inventory_enabled | bool'

  - name: 'Deploy /etc/glpi-agent/db-inventory.env'
    ansible.builtin.template:
      backup: false # contains secrets
      src: 'etc/glpi-agent/db-inventory.env.j2'
      dest: '/etc/glpi-agent/db-inventory.env'
      owner: 'root'
      group: 'root'
      mode: 0o600 # contains secrets
    when: 'glpi_agent__database_inventory_enabled | bool'

  - name: 'Deploy /etc/systemd/system/glpi-agent-database-inventory.service'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/glpi-agent-database-inventory.service.j2'
      dest: '/etc/systemd/system/glpi-agent-database-inventory.service'
      owner: 'root'
      group: 'root'
      mode: 0o644
    when: 'glpi_agent__database_inventory_enabled | bool'
    notify: 'glpi_agent: systemctl daemon-reload'

  - name: 'Deploy /etc/systemd/system/glpi-agent-database-inventory.timer'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/glpi-agent-database-inventory.timer.j2'
      dest: '/etc/systemd/system/glpi-agent-database-inventory.timer'
      owner: 'root'
      group: 'root'
      mode: 0o644
    when: 'glpi_agent__database_inventory_enabled | bool'
    notify: 'glpi_agent: systemctl daemon-reload'

  - name: 'systemctl enable and start glpi-agent-database-inventory.timer'
    ansible.builtin.systemd:
      daemon_reload: true
      enabled: true
      name: 'glpi-agent-database-inventory.timer'
      state: 'started'
    when: 'glpi_agent__database_inventory_enabled | bool'

  - name: 'systemctl stop and disable glpi-agent-database-inventory.timer'
    ansible.builtin.systemd:
      enabled: false
      name: 'glpi-agent-database-inventory.timer'
      state: 'stopped'
    register: '__glpi_agent__database_inventory_timer_result'
    failed_when:
      - '__glpi_agent__database_inventory_timer_result is failed'
      - '"Could not find" not in (__glpi_agent__database_inventory_timer_result["msg"] | d(""))'
    when: 'not (glpi_agent__database_inventory_enabled | bool)'

  - name: 'Remove the database inventory units and environment file'
    ansible.builtin.file:
      path: '{{ item }}'
      state: 'absent'
    loop:
      - '/etc/glpi-agent/db-inventory.env'
      - '/etc/systemd/system/glpi-agent-database-inventory.service'
      - '/etc/systemd/system/glpi-agent-database-inventory.timer'
    when: 'not (glpi_agent__database_inventory_enabled | bool)'
    notify: 'glpi_agent: systemctl daemon-reload'

  tags:
    - 'glpi_agent'
    - 'glpi_agent:database_inventory'


- block:

  - name: 'systemctl {{ glpi_agent__service_enabled | bool | ternary("enable", "disable") }} glpi-agent.service'
    ansible.builtin.systemd:
      name: 'glpi-agent.service'
      enabled: '{{ glpi_agent__service_enabled }}'

  - name: 'systemctl {{ glpi_agent__service_state | regex_replace("p?ed$", "") }} glpi-agent.service'
    ansible.builtin.systemd:
      name: 'glpi-agent.service'
      state: '{{ glpi_agent__service_state }}'
    register: '__glpi_agent__service_state_result'

  tags:
    - 'glpi_agent'
    - 'glpi_agent:state'
