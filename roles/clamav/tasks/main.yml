- block:

  - name: 'Set platform/version specific variables'
    ansible.builtin.import_role:
      name: 'shared'
      tasks_from: 'platform-variables.yml'

  - name: 'Install {{ __clamav__packages | join(" ") }}'
    ansible.builtin.package:
      name: '{{ __clamav__packages }}'
      state: 'present'

  - name: 'mkdir -p /etc/systemd/system/clamav-clamonacc.service.d/'
    ansible.builtin.file:
      path: '/etc/systemd/system/clamav-clamonacc.service.d/'
      state: 'directory'

  - name: 'Deploy /etc/systemd/system/clamav-clamonacc.service.d/fdpass.conf'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/clamav-clamonacc.service.d/fdpass.conf.j2'
      dest: '/etc/systemd/system/clamav-clamonacc.service.d/fdpass.conf'
      owner: 'root'
      group: 'root'
      mode: 0o644
    register: 'clamav__clamonacc_fdpass_result'
    notify: 'clamav: restart clamav-clamonacc'

  - name: 'Deploy /etc/systemd/system/clamav-clamdscan.service'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/clamav-clamdscan.service.j2'
      dest: '/etc/systemd/system/clamav-clamdscan.service'
      owner: 'root'
      group: 'root'
      mode: 0o644

  - name: 'Deploy /etc/systemd/system/clamav-clamdscan.timer'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/clamav-clamdscan.timer.j2'
      dest: '/etc/systemd/system/clamav-clamdscan.timer'
      owner: 'root'
      group: 'root'
      mode: 0o644
    register: 'clamav__systemd_clamdscan_timer_result'

  - name: 'Deploy /usr/local/bin/clamav-virusevent.sh'
    ansible.builtin.template:
      backup: true
      src: 'usr/local/bin/clamav-virusevent.sh.j2'
      dest: '/usr/local/bin/clamav-virusevent.sh'
      owner: 'root'
      group: 'root'
      mode: 0o755

  # On Debian/Ubuntu the clamav-daemon / clamav-freshclam packages ship their own
  # logrotate configs, so we only manage logrotate on Red Hat-family systems.
  - name: 'Deploy /etc/logrotate.d/clamav'
    ansible.builtin.template:
      backup: true
      src: 'etc/logrotate.d/clamav.j2'
      dest: '/etc/logrotate.d/clamav'
      owner: 'root'
      group: 'root'
      mode: 0o644
    when:
      - '__clamav__manage_logrotate | bool'

  tags:
    - 'clamav'


- block:

  - name: 'Deploy {{ __clamav__clamd_config }}'
    ansible.builtin.template:
      backup: true
      src: 'etc/clamd.d/scan.conf.j2'
      dest: '{{ __clamav__clamd_config }}'
      owner: 'root'
      group: 'root'
      mode: 0o644
    notify:
      - 'clamav: restart clamd'
      - 'clamav: restart clamav-clamonacc'

  - name: 'Remove rpmnew / rpmsave (and Debian equivalents)'
    ansible.builtin.include_role:
      name: 'shared'
      tasks_from: 'remove-rpmnew-rpmsave.yml'
    vars:
      shared__remove_rpmnew_rpmsave_config_file: '{{ __clamav__clamd_config }}'

  - name: 'Deploy {{ __clamav__freshclam_config }}'
    ansible.builtin.template:
      backup: true
      src: 'etc/freshclam.conf.j2'
      dest: '{{ __clamav__freshclam_config }}'
      owner: 'root'
      group: 'root'
      mode: 0o600
    # no notify required, as it is run by a timer.
    # freshclam reads this as root (before dropping to its database owner), so 0600
    # root:root is enough and also protects any proxy credentials in the file.

  - name: 'Remove rpmnew / rpmsave (and Debian equivalents)'
    ansible.builtin.include_role:
      name: 'shared'
      tasks_from: 'remove-rpmnew-rpmsave.yml'
    vars:
      shared__remove_rpmnew_rpmsave_config_file: '{{ __clamav__freshclam_config }}'

  - name: 'Deploy /var/lib/clamav/lfops_whitelist.ign2'
    ansible.builtin.template:
      backup: true
      src: 'var/lib/clamav/lfops_whitelist.ign2.j2'
      dest: '/var/lib/clamav/lfops_whitelist.ign2'
      owner: 'root'
      group: 'root'
      mode: 0o644
    notify: 'clamav: restart clamd'

  - name: 'Deploy /var/lib/clamav/lfops_whitelist.fp'
    ansible.builtin.template:
      backup: true
      src: 'var/lib/clamav/lfops_whitelist.fp.j2'
      dest: '/var/lib/clamav/lfops_whitelist.fp'
      owner: 'root'
      group: 'root'
      mode: 0o644
    notify: 'clamav: restart clamd'

  - name: 'Deploy {{ __clamav__filelist }}'
    ansible.builtin.template:
      backup: true
      src: 'etc/clamd.d/clamdscan.filelist.j2'
      dest: '{{ __clamav__filelist }}'
      owner: 'root'
      group: 'root'
      mode: 0o644

  tags:
    - 'clamav'
    - 'clamav:configure'


- block:

  # On EPEL the database directory ships as root:root, but freshclam drops to its
  # database owner (clamupdate on RHEL, clamav on Debian/Ubuntu) before writing and
  # then cannot create the database. Make the directory owned by that user. clamd
  # reads the database via the world-readable mode.
  - name: 'chown {{ __clamav__db_owner }} /var/lib/clamav'
    ansible.builtin.file:
      path: '/var/lib/clamav'
      state: 'directory'
      owner: '{{ __clamav__db_owner }}'
      group: '{{ __clamav__db_owner }}'
      mode: 0o755

  # clamd refuses to start without a signature database, and on Debian/Ubuntu
  # clamav-daemon.service additionally guards this with
  # ConditionPathExistsGlob=.../daily.{cvd,cld}. The freshclam daemon below would
  # eventually fetch the database, but not before this play tries to start clamd.
  # So seed the database once, up front, guarded by `creates` so it only downloads
  # on a fresh host (no lock conflict with the not-yet-started freshclam daemon).
  - name: 'freshclam (seed the signature database so clamd can start)'
    ansible.builtin.command: 'freshclam --config-file={{ __clamav__freshclam_config }}'
    args:
      creates: '/var/lib/clamav/daily.c?d'
    when:
      - 'clamav__clamd_service_enabled | bool'

  - name: 'systemctl {{ clamav__clamd_service_enabled | bool | ternary("enable", "disable") }} {{ __clamav__clamd_service }}'
    ansible.builtin.service:
      name: '{{ __clamav__clamd_service }}'
      enabled: '{{ clamav__clamd_service_enabled }}'

  - name: 'systemctl {{ clamav__clamd_service_state | regex_replace("p?ed$", "") }} {{ __clamav__clamd_service }}'
    ansible.builtin.service:
      name: '{{ __clamav__clamd_service }}'
      state: '{{ clamav__clamd_service_state }}'
    register: '__clamav__clamd_service_state_result'

  - name: 'systemctl {{ clamav__clamonacc_service_enabled | bool | ternary("enable", "disable") }} clamav-clamonacc.service'
    ansible.builtin.service:
      name: 'clamav-clamonacc.service'
      enabled: '{{ clamav__clamonacc_service_enabled }}'
      daemon_reload: '{{ clamav__clamonacc_fdpass_result is changed }}'

  - name: 'systemctl {{ clamav__clamonacc_service_state | regex_replace("p?ed$", "") }} clamav-clamonacc.service'
    ansible.builtin.service:
      name: 'clamav-clamonacc.service'
      state: '{{ clamav__clamonacc_service_state }}'
    register: '__clamav__clamonacc_service_state_result'

  - name: 'systemctl {{ clamav__clamdscan_timer_enabled | bool | ternary("enable", "disable") }} --now clamav-clamdscan.timer'
    ansible.builtin.service:
      name: 'clamav-clamdscan.timer'
      enabled: '{{ clamav__clamdscan_timer_enabled }}'
      state: '{{ clamav__clamdscan_timer_enabled | bool | ternary("started", "stopped") }}'
      daemon_reload: '{{ clamav__systemd_clamdscan_timer_result is changed }}'

  - name: 'systemctl {{ clamav__freshclam_service_enabled | bool | ternary("enable", "disable") }} --now clamav-freshclam.service'
    ansible.builtin.service:
      name: 'clamav-freshclam.service'
      enabled: '{{ clamav__freshclam_service_enabled }}'
      state: '{{ clamav__freshclam_service_enabled | bool | ternary("started", "stopped") }}'

  tags:
    - 'clamav'
    - 'clamav:state'


- block:

  # Self-test: confirm the engine plus signature database actually detect malware,
  # using the EICAR test string. We feed it to the standalone `clamscan` over stdin
  # on purpose, NOT `clamdscan`: routing it through clamd would fire the configured
  # VirusEvent (a "malware found" mail on every run) and, with on-access scanning
  # enabled, a detection event. Reading from stdin also means nothing is ever written
  # to disk. The EICAR string is assembled from two halves so that this role's own
  # files are not flagged when a clamav scan runs across the collection.
  - name: 'Verify ClamAV detects the EICAR test signature'
    ansible.builtin.command: 'clamscan --no-summary -'
    args:
      stdin: '{{ "X5O!P%@AP[4\\PZX54(P^)7CC)7}" ~ "$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!$H+H*" }}'
    register: '__clamav__eicar_result'
    changed_when: false
    failed_when: '"FOUND" not in __clamav__eicar_result["stdout"]'

  tags:
    - 'clamav'
    - 'clamav:test'
