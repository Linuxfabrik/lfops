argument_specs:
  main:
    options:

      trend_micro__customer_id:
        type: 'str'
        required: true
        description: 'Customer ID used in the installer API request.'

      trend_micro__group_id:
        type: 'int'
        required: false
        default: 0
        description: 'Agent group for organisation. 0 means no specific choice.'

      trend_micro__path_dsa:
        type: 'str'
        required: false
        default: '/opt/ds_agent/dsa_control'
        description: 'Path to the dsa_control binary.'

      trend_micro__path_identity_file:
        type: 'str'
        required: false
        default: '/opt/TrendMicro/EndpointBasecamp/etc/.identity'
        description: 'Path polled to confirm agent registration.'

      trend_micro__policy_id:
        type: 'int'
        required: false
        default: 0
        description: 'Security policy to apply. 0 means no specific choice.'

      trend_micro__proxy_addr:
        type: 'str'
        required: false
        default: ''
        description: 'Proxy hostname or IP. Leave empty for a direct connection.'

      trend_micro__proxy_login:
        type: 'dict'
        required: false
        default: {}
        description: >-
          Proxy credentials. May contain the keys `username` and `password`.
          Typically fed by `linuxfabrik.lfops.bitwarden_item`, which returns the
          full Bitwarden item; extra keys are ignored. Omit for a proxy that
          needs no authentication.

      trend_micro__proxy_port:
        type: 'str'
        required: false
        default: ''
        description: 'Proxy port.'

      trend_micro__relay_group_id:
        type: 'int'
        required: false
        default: 0
        description: 'Relay group for agent communication. 0 means no specific choice.'

      trend_micro__swp_dsm_fqdn:
        type: 'str'
        required: true
        description: 'Deep Security Manager FQDN used to activate Server & Workload Protection.'

      trend_micro__swp_login:
        type: 'dict'
        required: true
        description: >-
          Server & Workload Protection activation credentials. Must contain the
          keys `tenant_id` and `token`. Typically fed by
          `linuxfabrik.lfops.bitwarden_item`, which returns the full Bitwarden
          item; extra keys are ignored.

      trend_micro__xbc_env:
        type: 'str'
        required: false
        default: 'prod-eu1'
        description: 'XBC environment identifier.'

      trend_micro__xbc_fqdn:
        type: 'str'
        required: false
        default: 'api-eu1.xbc.trendmicro.com'
        description: 'XBC backend FQDN. Use the FQDN matching your region.'

      trend_micro__xbc_installer_aarch64_company_id:
        type: 'str'
        required: true
        description: 'Company ID for the aarch64 installer API request.'

      trend_micro__xbc_installer_aarch64_scenario_ids:
        type: 'list'
        elements: 'str'
        required: true
        description: 'List of scenario IDs for the aarch64 installer API request.'

      trend_micro__xbc_installer_x86_64_company_id:
        type: 'str'
        required: true
        description: 'Company ID for the x86_64 installer API request.'

      trend_micro__xbc_installer_x86_64_scenario_ids:
        type: 'list'
        elements: 'str'
        required: true
        description: 'List of scenario IDs for the x86_64 installer API request.'
