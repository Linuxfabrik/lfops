- block:

  - name: 'Deploy /etc/security/limits.d/linuxfabrik-core-dumps.conf'
    ansible.builtin.template:
      backup: true
      src: 'etc/security/limits.d/linuxfabrik-core-dumps.conf.j2'
      dest: '/etc/security/limits.d/linuxfabrik-core-dumps.conf'
      owner: 'root'
      group: 'root'
      mode: 0o644

  - name: 'Deploy /etc/sysctl.d/linuxfabrik-core-dumps.conf'
    ansible.builtin.template:
      backup: true
      src: 'etc/sysctl.d/linuxfabrik-core-dumps.conf.j2'
      dest: '/etc/sysctl.d/linuxfabrik-core-dumps.conf'
      owner: 'root'
      group: 'root'
      mode: 0o644
    notify: 'core_dumps: sysctl --system'

  - name: 'mkdir -p /etc/systemd/coredump.conf.d'
    ansible.builtin.file:
      path: '/etc/systemd/coredump.conf.d'
      state: 'directory'
      owner: 'root'
      group: 'root'
      mode: 0o755

  - name: 'Deploy /etc/systemd/coredump.conf.d/linuxfabrik.conf'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/coredump.conf.d/linuxfabrik.conf.j2'
      dest: '/etc/systemd/coredump.conf.d/linuxfabrik.conf'
      owner: 'root'
      group: 'root'
      mode: 0o644

  tags:
    - 'core_dumps'
