# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __blocky__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags blocky:state`), where
# the result is never registered.
- name: 'blocky: validate config & restart blocky.service'
  ansible.builtin.command: '/usr/local/sbin/blocky validate --config /etc/blocky/config.yml'
  notify:
    - 'blocky: restart blocky.service'

- name: 'blocky: restart blocky.service'
  ansible.builtin.service:
    name: 'blocky.service'
    state: 'restarted'
  when:
    - '__blocky__service_state_result is not defined or __blocky__service_state_result is not changed'
    - 'blocky__service_state != "stopped"'
