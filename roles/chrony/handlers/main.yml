# skip restart if the operator deferred restarts LFOps-wide (lfops__skip_restart_handlers), if
# the service was just started (redundant), or if the user wants it stopped.
# __chrony__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags chrony:state`), where
# the result is never registered.
- name: 'chrony: restart chronyd.service'
  ansible.builtin.service:
    name: 'chronyd.service'
    state: 'restarted'
  when:
    - 'not (lfops__skip_restart_handlers | d(false) | bool)'
    - '__chrony__service_state_result is not defined or __chrony__service_state_result is not changed'
    - 'chrony__service_state != "stopped"'
