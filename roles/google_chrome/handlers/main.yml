- name: 'google_chrome: systemctl daemon-reload'
  ansible.builtin.systemd:
    daemon_reload: true

- name: 'google_chrome: restart chrome-headless-proxy.socket'
  ansible.builtin.service:
    name: 'chrome-headless-proxy.socket'
    state: 'restarted'
  when:
    - 'google_chrome__service_state != "stopped"'

- name: 'google_chrome: restart chrome-headless'
  ansible.builtin.service:
    name: 'chrome-headless.service'
    state: 'restarted'
  when:
    - 'google_chrome__service_state != "stopped"'
