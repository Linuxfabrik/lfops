# skip restart if the operator deferred restarts LFOps-wide (lfops__skip_restart_handlers), if
# the service was just started (redundant), or if the user wants it stopped.
# __postgresql_server__service_state_result is registered on a dedicated state-only task (not the
# enabled task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags postgresql_server:state`),
# where the result is never registered.
- name: 'postgresql_server: restart posgresql'
  ansible.builtin.service:
    name: 'postgresql-{{ postgresql_server__version }}'
    state: 'restarted'
  when:
    - 'not (lfops__skip_restart_handlers | d(false) | bool)'
    - '__postgresql_server__service_state_result is not defined or __postgresql_server__service_state_result is not changed'
    - 'postgresql_server__state != "stopped"'
