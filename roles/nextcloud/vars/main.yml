# OS-specific values consumed by a *different* role that runs *earlier* in the same play (the `__dependent_var` pattern). vars/<os>.yml would load too late for an earlier consumer, but vars/main.yml is auto-loaded at play parse and is visible to every role in the play. The public variables in defaults/main.yml select from these dicts with the linuxfabrik.lfops.platform_select filter; to extend platform support, add a Debian / Suse key here.

# PHP modules installed by the linuxfabrik.lfops.php role via nextcloud__php__modules__dependent_var.
__nextcloud__php__modules__dependent_var:
  RedHat:
    - name: 'php-bcmath'
      state: 'present'
    - name: 'php-gd'
      state: 'present'
    - name: 'php-gmp'
      state: 'present'
    # IMAP was removed from PHP core in 8.4 and ships as the PECL package php-pecl-imap there; on
    # <= 8.3 it is still the core php-imap. Pick the name from the PHP version the php role detected.
    - name: '{{ "php-pecl-imap" if php__installed_version is version("8.4", ">=") else "php-imap" }}'
      state: 'present'
    - name: 'php-imagick'
      state: 'present'
    - name: 'php-intl'
      state: 'present'
    - name: 'php-json'
      state: 'present'
    - name: 'php-ldap'
      state: 'present'
    - name: 'php-mbstring'
      state: 'present'
    - name: 'php-memcached'
      state: 'present'
    - name: 'php-mysqlnd'
      state: 'present'
    - name: 'php-opcache'
      state: 'present'
    - name: 'php-pecl-apcu'
      state: 'present'
    - name: 'php-process' # posix module for oc
      state: 'present'
    - name: 'php-redis'
      state: 'present'
    - name: 'php-smbclient'
      state: 'present'
    - name: 'php-zip'
      state: 'present'
  # Debian/Ubuntu install PHP from Sury (php<version>-* packages, pulled in via the php-<module>
  # metapackages). Verified against Debian 13 / PHP 8.4. Differences from the RedHat list:
  #   * php-mysqlnd  -> php-mysql, php-pecl-apcu -> php-apcu (different upstream package names)
  #   * php-imap     -> php<version>-imap: the php-imap metapackage pins php8.3-imap (IMAP is
  #                  unbundled from PHP 8.4), which would drag a second PHP runtime onto the host;
  #                  the versioned package is the clean per-version build (core on <= 8.3, PECL on >= 8.4)
  #   * php-opcache  dropped: php<version>-opcache is pulled in by the php base package already
  #   * php-process  dropped: the posix extension is built into the Debian php-cli/-common packages
  #   * php-json     dropped: JSON is compiled into PHP 8 core (php-json is only a transitional dummy)
  Debian:
    - name: 'php-apcu'
      state: 'present'
    - name: 'php-bcmath'
      state: 'present'
    - name: 'php-gd'
      state: 'present'
    - name: 'php-gmp'
      state: 'present'
    - name: 'php-imagick'
      state: 'present'
    # Versioned PECL/core package; Sury names it uniformly across PHP versions, so unlike the
    # php-imap metapackage it does not drag a second PHP runtime onto the host.
    - name: 'php{{ php__installed_version }}-imap'
      state: 'present'
    - name: 'php-intl'
      state: 'present'
    - name: 'php-ldap'
      state: 'present'
    - name: 'php-mbstring'
      state: 'present'
    - name: 'php-memcached'
      state: 'present'
    - name: 'php-mysql'
      state: 'present'
    - name: 'php-redis'
      state: 'present'
    - name: 'php-smbclient'
      state: 'present'
    - name: 'php-zip'
      state: 'present'
__nextcloud__php_fpm_service_name: '{{ php__fpm_service_name }}'
