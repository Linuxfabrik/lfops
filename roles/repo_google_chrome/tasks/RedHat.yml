- block:

  - name: 'curl https://dl-ssl.google.com/linux/linux_signing_key.pub --output /tmp/ansible.google-chrome.key'
    ansible.builtin.get_url:
      url: 'https://dl-ssl.google.com/linux/linux_signing_key.pub'
      dest: '/tmp/ansible.google-chrome.key'
      mode: 0o644
    delegate_to: 'localhost'
    become: false
    run_once: true
    changed_when: false # not an actual config change on the server
    check_mode: false # run task even if `--check` is specified

  - name: 'copy /tmp/ansible.google-chrome.key to /etc/pki/rpm-gpg/google-chrome.key'
    ansible.builtin.copy:
      src: '/tmp/ansible.google-chrome.key'
      dest: '/etc/pki/rpm-gpg/google-chrome.key'
      owner: 'root'
      group: 'root'
      mode: 0o644

  # https://www.google.com/linuxrepositories/
  - name: 'deploy the Google Chrome repo (mirror: {{ repo_google_chrome__mirror_url }})'
    ansible.builtin.template:
      backup: true
      src: 'etc/yum.repos.d/google-chrome.repo.j2'
      dest: '/etc/yum.repos.d/google-chrome.repo'
      owner: 'root'
      group: 'root'
      mode: 0o644

  - name: 'Remove rpmnew / rpmsave (and Debian equivalents)'
    ansible.builtin.include_role:
      name: 'shared'
      tasks_from: 'remove-rpmnew-rpmsave.yml'
    vars:
      shared__remove_rpmnew_rpmsave_config_file: '/etc/yum.repos.d/google-chrome.repo'

  tags:
    - 'repo_google_chrome'
