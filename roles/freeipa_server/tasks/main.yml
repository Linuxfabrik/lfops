  - name: 'Create or update FreeIPA users'
    # freeipa.ansible_freeipa.ipauser: # TODO: switch back once https://github.com/freeipa/ansible-freeipa/pull/1415 is merged and released
    linuxfabrik.lfops.ipauser:
      ipaadmin_password: '{{ freeipa_server__ipa_admin_password }}'
      ipaadmin_principal: '{{ freeipa_server__ipa_admin_principal }}'
      name: '{{ item["name"] }}'
      first: '{{ item["first"] }}'
      last: '{{ item["last"] }}'
      password: '{{ item["password"] | default(omit) }}'
      email: '{{ item["email"] | default(omit) }}'
      shell: '{{ item["shell"] | default(omit) }}'
      sshpubkey: '{{ item["sshpubkey"] | default(omit) }}'
      update_password: '{{ item["update_password"] | default("on_create") }}'
      state: 'present'
    loop: '{{ (freeipa_server__users__combined_var | selectattr("state", "defined") | selectattr("state", "ne", "absent") | list)
            + (freeipa_server__users__combined_var | selectattr("state", "undefined") | list) }}'
    loop_control:
      label: '{{ item["name"] }}'
    # no_log: true

  - name: 'Manage FreeIPA user group memberships'
    # freeipa.ansible_freeipa.ipagroup: # TODO: switch back once https://github.com/freeipa/ansible-freeipa/pull/1415 is merged and released
    linuxfabrik.lfops.ipagroup:
      ipaadmin_password: '{{ freeipa_server__ipa_admin_password }}'
      ipaadmin_principal: '{{ freeipa_server__ipa_admin_principal }}'
      name: '{{ item[1] }}'
      user:
        - '{{ item[0]["name"] }}'
      action: 'member'
    loop: '{{ ((freeipa_server__users__combined_var | selectattr("state", "defined") | selectattr("state", "ne", "absent") | list)
            + (freeipa_server__users__combined_var | selectattr("state", "undefined") | list))
            | subelements("groups", skip_missing=true) }}'
    loop_control:
      label: '{{ item[0]["name"] }} -> {{ item[1] }}'

  tags:
    - 'freeipa_server'
    - 'freeipa_server:configure'
    - 'freeipa_server:user'


