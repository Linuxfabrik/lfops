- block:

  - name: 'check that the hostname has two-levels'
    ansible.builtin.assert:
      that: 'ansible_facts["nodename"].split(".") | length >= 3'
      fail_msg: '"{{ ansible_facts["nodename"] }} has less than two levels. This is required for FreeIPA to work.'

  - name: 'check that the DNS reverse lookup config is working'
    ansible.builtin.assert:
      # ansible determines the domain by using socket.gethostbyaddr() which is a DNS reverse lookup (see module_utils/facts/system/platform.py)
      that: 'ansible_facts["domain"] is defined and ansible_facts["domain"] | length > 0'
      fail_msg: 'DNS reverse lookup for "{{ ansible_facts["fqdn"] }}" failed. This is required for FreeIPA to work.'

  - name: 'Running freeipa.ansible_freeipa.ipaserver with following vars'
    ansible.builtin.debug:
      msg:
        ipaadmin_password: '{{ freeipa_server__ipa_admin_password }}'
        ipaclient_mkhomedir: true
        ipaclient_no_ntp: true
        ipadm_password: '{{ freeipa_server__directory_manager_password }}'
        ipaserver_domain: '{{ freeipa_server__domain }}'
        ipaserver_realm: '{{ freeipa_server__realm }}'
        ipaserver_setup_firewalld: false

  - name: 'Use freeipa.ansible_freeipa.ipaserver role to install and configure FreeIPA as a server'
    ansible.builtin.include_role:
      name: 'freeipa.ansible_freeipa.ipaserver'
    vars:
      ipaadmin_password: '{{ freeipa_server__ipa_admin_password }}'
      ipaclient_mkhomedir: true
      ipaclient_no_ntp: true
      ipadm_password: '{{ freeipa_server__directory_manager_password }}'
      ipaserver_domain: '{{ freeipa_server__domain }}'
      ipaserver_realm: '{{ freeipa_server__realm }}'
      ipaserver_setup_firewalld: false

  tags:
    - 'freeipa_server'


- block:

  - name: 'ensures /etc/systemd/system/pki-tomcatd@.service.d dir exists'
    ansible.builtin.file:
      path: '/etc/systemd/system/pki-tomcatd@.service.d'
      state: 'directory'

  - name: 'deploy /etc/systemd/system/pki-tomcatd@.service.d/override.conf'
    ansible.builtin.template:
      src: 'etc/systemd/system/pki-tomcatd@.service.d/override.conf.j2'
      dest: '/etc/systemd/system/pki-tomcatd@.service.d/override.conf'
      owner: 'root'
      group: 'root'
      mode: 0o644

  tags:
    - 'freeipa_server'
    - 'freeipa_server:configure'
    - 'freeipa_server:systemd_override'


# group management
- block:

  - name: 'Combined Groups:'
    ansible.builtin.debug:
      var: 'freeipa_server__groups__combined_var'

  - name: 'Remove FreeIPA groups'
    # freeipa.ansible_freeipa.ipagroup: # TODO: switch back once https://github.com/freeipa/ansible-freeipa/pull/1415 is merged and released
    linuxfabrik.lfops.ipagroup:
      ipaadmin_password: '{{ freeipa_server__ipa_admin_password }}'
      ipaadmin_principal: '{{ freeipa_server__ipa_admin_principal }}'
      name: '{{ item["name"] }}'
      state: 'absent'
    loop: '{{ freeipa_server__groups__combined_var | selectattr("state", "defined") | selectattr("state", "eq", "absent") | list }}'
    loop_control:
      label: '{{ item["name"] }}'

  - name: 'Create or update FreeIPA groups'
    # freeipa.ansible_freeipa.ipagroup: # TODO: switch back once https://github.com/freeipa/ansible-freeipa/pull/1415 is merged and released
