      ipaadmin_principal: '{{ freeipa_server__ipa_admin_principal }}'
      name: '{{ item["name"] }}'
      description: '{{ item["description"] | default(omit) }}'
      gidnumber: '{{ item["gidnumber"] | default(omit) }}'
      nonposix: '{{ item["nonposix"] | default(omit) }}'
      external: '{{ item["external"] | default(omit) }}'
      state: 'present'
    loop: '{{ (freeipa_server__groups__combined_var | selectattr("state", "defined") | selectattr("state", "ne", "absent") | list)
            + (freeipa_server__groups__combined_var | selectattr("state", "undefined") | list) }}'
    loop_control:
