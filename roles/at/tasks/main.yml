- name: 'Install at'
  ansible.builtin.package:
    name: 'at'
    state: 'present'
  tags:
    - 'at'


- block:

  - name: 'systemctl {{ at__service_enabled | bool | ternary("enable", "disable") }} atd.service'
    ansible.builtin.service:
      name: 'atd.service'
      enabled: '{{ at__service_enabled | bool }}'

  - name: 'systemctl {{ at__service_state }} atd.service'
    ansible.builtin.service:
      name: 'atd.service'
      state: '{{ at__service_state }}'

  tags:
    - 'at'
    - 'at:state'
