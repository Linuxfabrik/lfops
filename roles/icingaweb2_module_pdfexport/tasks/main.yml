- block:

  - name: 'Set platform/version specific variables'
    ansible.builtin.import_role:
      name: 'shared'
      tasks_from: 'platform-variables.yml'

  tags:
    - 'always'


- block:

  - name: 'mkdir -p /usr/share/icingaweb2/modules/pdfexport'
    ansible.builtin.file:
      path: '/usr/share/icingaweb2/modules/pdfexport'
      state: 'directory'
      owner: '{{ __icingaweb2_module_pdfexport__icingaweb2_owner }}'
      group: 'icingaweb2'
      mode: 0o755

  - name: 'curl https://github.com/Icinga/icingaweb2-module-pdfexport/archive/{{ icingaweb2_module_pdfexport__version }}.tar.gz --output /tmp/ansible.icingaweb2-module-pdfexport-{{ icingaweb2_module_pdfexport__version }}.tar.gz' # noqa risky-file-permissions (temporary file)
    ansible.builtin.get_url:
      url: 'https://github.com/Icinga/icingaweb2-module-pdfexport/archive/{{ icingaweb2_module_pdfexport__version }}.tar.gz'
      dest: '/tmp/ansible.icingaweb2-module-pdfexport-{{ icingaweb2_module_pdfexport__version }}.tar.gz'
    delegate_to: 'localhost'
    become: false
    run_once: true
    check_mode: false # run task even if `--check` is specified

  - name: 'copy /tmp/ansible.icingaweb2-module-pdfexport-{{ icingaweb2_module_pdfexport__version }}.tar.gz to the server' # noqa risky-file-permissions (temporary file)
    ansible.builtin.copy:
      src: '/tmp/ansible.icingaweb2-module-pdfexport-{{ icingaweb2_module_pdfexport__version }}.tar.gz'
      dest: '/tmp/ansible.icingaweb2-module-pdfexport-{{ icingaweb2_module_pdfexport__version }}.tar.gz'

  - name: 'tar xfz --strip-components 1 -C /usr/share/icingaweb2/modules/pdfexport /tmp/ansible.icingaweb2-module-pdfexport-{{ icingaweb2_module_pdfexport__version }}.tar.gz'
    ansible.builtin.unarchive:
      src: '/tmp/ansible.icingaweb2-module-pdfexport-{{ icingaweb2_module_pdfexport__version }}.tar.gz'
      dest: '/usr/share/icingaweb2/modules/pdfexport'
      remote_src: false
      extra_opts:
        - '--strip-components=1'

  - name: 'rm -f /tmp/ansible.icingaweb2-module-pdfexport-{{ icingaweb2_module_pdfexport__version }}.tar.gz'
    ansible.builtin.file:
      path: '/tmp/ansible.icingaweb2-module-pdfexport-{{ icingaweb2_module_pdfexport__version }}.tar.gz'
      state: 'absent'

  - name: 'icingacli module enable pdfexport'
    ansible.builtin.command: 'icingacli module enable pdfexport'
    args:
      creates: '/etc/icingaweb2/enabledModules/pdfexport'

  tags:
    - 'icingaweb2_module_pdfexport'


- block:

  - name: 'mkdir -p /etc/icingaweb2/modules/pdfexport'
    ansible.builtin.file:
      path: '/etc/icingaweb2/modules/pdfexport'
      state: 'directory'
      owner: '{{ __icingaweb2_module_pdfexport__icingaweb2_owner }}'
      group: 'icingaweb2'
      mode: 0o2770

  - name: 'Deploy /etc/icingaweb2/modules/pdfexport/config.ini'
    ansible.builtin.template:
      backup: true
      src: 'etc/icingaweb2/modules/pdfexport/config.ini.j2'
      dest: '/etc/icingaweb2/modules/pdfexport/config.ini'
      owner: '{{ __icingaweb2_module_pdfexport__icingaweb2_owner }}'
      group: 'icingaweb2'
      mode: 0o660

  - name: 'Remove rpmnew / rpmsave (and Debian equivalents)'
    ansible.builtin.include_role:
      name: 'shared'
      tasks_from: 'remove-rpmnew-rpmsave.yml'
    vars:
      shared__remove_rpmnew_rpmsave_config_file: '/etc/icingaweb2/modules/pdfexport/config.ini'

  tags:
    - 'icingaweb2_module_pdfexport'
    - 'icingaweb2_module_pdfexport:configure'
