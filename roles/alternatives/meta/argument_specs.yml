argument_specs:
  main:
    options:

      alternatives__alternatives:
        type: 'list'
        elements: 'dict'
        required: false
        default: []
        description: >-
          List of `update-alternatives` entries to manage.
        options:

          family:
            type: 'str'
            required: false
            description: >-
              Groups similar alternatives. Red Hat-family only
              (community.general 10.1.0+).

          link:
            type: 'str'
            required: false
            description: >-
              Path to the symlink that should point at the real
              executable. Mandatory on Red Hat-family. On Debian only
              required when the alternative `name` is unknown to the
              system.

          name:
            type: 'str'
            required: true
            description: 'The generic name of the alternative.'

          path:
            type: 'str'
            required: false
            description: 'Path to the real executable.'

          priority:
            type: 'int'
            required: false
            description: >-
              Priority weight for `auto` mode. If unset, the module
              falls back to 50 on creation.

          state:
            type: 'str'
            required: false
            default: 'selected'
            choices:
              - 'absent'
              - 'auto'
              - 'present'
              - 'selected'
            description: >-
              `selected` (default), `present`, `auto`, or `absent`.

          subcommands:
            type: 'list'
            elements: 'dict'
            required: false
            description: >-
              Subcommands (also called slaves or followers) switched
              together with this alternative (community.general 5.1.0+).
            options:

              link:
                type: 'str'
                required: true
                description: 'Path to the subcommand symlink.'

              name:
                type: 'str'
                required: true
                description: 'The generic name of the subcommand.'

              path:
                type: 'str'
                required: true
                description: 'Path to the real subcommand executable.'
