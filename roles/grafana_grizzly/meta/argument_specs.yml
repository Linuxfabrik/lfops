argument_specs:
  main:
    options:

      grafana_grizzly__grafana_service_account_login:
        type: 'dict'
        required: true
        description: >-
          Login for a Grafana service account with an `Admin` token.
          The password is generated by Grafana on first creation and
          must be captured from the Ansible output.
        options:

          password:
            type: 'str'
            required: true
            description: 'The service-account token (treated as password).'

          username:
            type: 'str'
            required: true
            description: 'The service-account username.'

      grafana_grizzly__grafana_url:
        type: 'str'
        required: false
        description: >-
          The URL under which Grafana is reachable. Defaults to
          `{{ grafana__api_url }}`.

      grafana_grizzly__version:
        type: 'str'
        required: false
        default: 'v0.2.0'
        description: >-
          The version of grizzly to install. Possible options:
          `'latest'`, or any tag from
          https://github.com/grafana/grizzly/releases.
