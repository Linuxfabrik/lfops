argument_specs:
  main:
    options:

      grafana_grizzly__grafana_service_account_login:
        type: 'dict'
        required: true
        description: >-
          Login for a Grafana service account with an `Admin` token.
          Must contain the keys `username` and `password`. Typically
          fed by `linuxfabrik.lfops.bitwarden_item`, which returns the
          full Bitwarden item; extra keys are ignored. The password is
          generated by Grafana on first creation and must be captured
          from the Ansible output.

      grafana_grizzly__grafana_url:
        type: 'str'
        required: false
        description: >-
          The URL under which Grafana is reachable. Defaults to
          `{{ grafana__api_url }}`.

      grafana_grizzly__version:
        type: 'str'
        required: false
        default: 'v0.2.0'
        description: >-
          The version of grizzly to install. Possible options:
          `'latest'`, or any tag from
          https://github.com/grafana/grizzly/releases.
