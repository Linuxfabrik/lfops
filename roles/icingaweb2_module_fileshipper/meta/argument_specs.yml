argument_specs:
  main:
    options:

      icingaweb2_module_fileshipper__url:
        type: 'str'
        required: false
        description: >-
          The URL from which the module tarball is downloaded.
          Defaults to
          `https://github.com/Icinga/icingaweb2-module-fileshipper/archive/{{ icingaweb2_module_fileshipper__version }}.tar.gz`.

      icingaweb2_module_fileshipper__version:
        type: 'str'
        required: true
        description: >-
          The module version to install. Possible options:
          https://github.com/Icinga/icingaweb2-module-fileshipper/releases.
