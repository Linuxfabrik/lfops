# skip restart if the service was just started (redundant) or if the user wants it stopped.
# __vsftpd__service_state_result is registered on a dedicated state-only task (not the enabled
# task), so that enabled-only changes don't prevent the restart.
# `is not defined` covers a run that skips the state block (`--skip-tags vsftpd:state`), where
# the result is never registered.
- name: 'vsftpd: restart vsftpd'
  ansible.builtin.service:
    state: 'restarted'
    name: 'vsftpd'
  when:
    - '__vsftpd__service_state_result is not defined or __vsftpd__service_state_result is not changed'
    - 'vsftpd__service_state != "stopped"'
