- block:

  - name: 'systemctl {{ kdump__service_enabled | bool | ternary("enable", "disable") }} kdump.service'
    ansible.builtin.service:
      name: 'kdump'
      enabled: '{{ kdump__service_enabled }}'
    register: '__kdump__service_enabled_result'
    # ignore errors if the service does not exist
    failed_when: '__kdump__service_enabled_result["failed"] is defined and __kdump__service_enabled_result["failed"] and not "Could not find the requested service" in __kdump__service_enabled_result["msg"]'

  - name: 'systemctl {{ kdump__service_state | regex_replace("p?ed$", "") }} kdump.service'
    ansible.builtin.service:
      name: 'kdump'
      state: '{{ kdump__service_state }}'
    register: '__kdump__service_state_result'
    # ignore errors if the service does not exist
    failed_when: '__kdump__service_state_result["failed"] is defined and __kdump__service_state_result["failed"] and not "Could not find the requested service" in __kdump__service_state_result["msg"]'

  tags:
    - 'kdump'
