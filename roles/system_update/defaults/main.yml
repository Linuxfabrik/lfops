system_update__cache_only: false
system_update__mail_from: '{{ mailto_root__from }}'
system_update__mail_recipients_new_configfiles: '{{ mailto_root__to }}'
system_update__mail_recipients_updates: '{{ mailto_root__to }}'
system_update__mail_subject_hostname: '$(hostname --short)'
system_update__mail_subject_prefix: ''
# default: the morning before the regular update day, so the heads-up arrives
# before the window. derived as the weekday preceding system_update__update_day;
# for a multi-day or date-based update_day, set this explicitly.
system_update__notify_and_schedule_on_calendar: '{{
    {"Mon": "Sun", "Tue": "Mon", "Wed": "Tue", "Thu": "Wed", "Fri": "Thu", "Sat": "Fri", "Sun": "Sat"}.get(system_update__update_day[:3] | capitalize, "Mon")
  }} 10:00'
system_update__rocketchat_msg_suffix: ''
system_update__security_enabled: true
# the reboot window is owned by the schedule_reboot role; d() fallback keeps this
# role usable if it is ever run without schedule_reboot in the play.
system_update__security_on_calendar: '*-*-* {{ schedule_reboot__reboot_time__combined_var | d("04:00") }}'
system_update__security_repos:
  - 'security'
system_update__update_day: 'Tue'
system_update__update_enabled: true
system_update__update_on_calendar: '{{ system_update__update_day }} {{ schedule_reboot__reboot_time__combined_var | d("04:00") }}'
