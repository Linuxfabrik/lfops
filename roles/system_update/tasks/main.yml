- name: 'Perform platform/version specific tasks'
  ansible.builtin.include_tasks: '{{ __task_file }}'
  when: '__task_file | length > 0'
  vars:
    __task_file: '{{ lookup("ansible.builtin.first_found", __first_found_options) }}'
    __first_found_options:
      files:
        - '{{ ansible_facts["distribution"] }}{{ ansible_facts["distribution_version"] }}.yml'
        - '{{ ansible_facts["distribution"] }}{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["distribution"] }}.yml'
        - '{{ ansible_facts["os_family"] }}{{ ansible_facts["distribution_version"] }}.yml'
        - '{{ ansible_facts["os_family"] }}{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["os_family"] }}.yml'
      paths:
        - '{{ role_path }}/tasks'
      skip: true
  tags:
    - 'always'


# Regular lane, deployed on all hosts:
# - notify-and-schedule: informational "updates pending" mail
# - update-and-reboot:   applies all updates at the window, drops a reboot request if
#                        needed. The reboot itself is handled by the schedule_reboot role.
- block:

  - name: 'Deploy /usr/local/libexec/notify-and-schedule'
    ansible.builtin.template:
      backup: true
      src: 'usr/local/libexec/notify-and-schedule.j2'
      dest: '/usr/local/libexec/notify-and-schedule'
      owner: 'root'
      group: 'root'
      mode: 0o744

  - name: 'Deploy /usr/local/sbin/update-and-reboot'
    ansible.builtin.template:
      backup: true
      src: 'usr/local/sbin/update-and-reboot.j2'
      dest: '/usr/local/sbin/update-and-reboot'
      owner: 'root'
      group: 'root'
      mode: 0o744

  # the scripts used to live in /usr/local/bin; remove the stale copies after relocating
  # them to FHS-correct /usr/local/sbin (admin commands) and /usr/local/libexec (helpers).
  - name: 'rm -f the pre-FHS /usr/local/bin script locations'
    ansible.builtin.file:
      path: '{{ item }}'
      state: 'absent'
    loop:
      - '/usr/local/bin/notify-and-schedule'
      - '/usr/local/bin/security-reboot'
      - '/usr/local/bin/security-update'
      - '/usr/local/bin/update-and-reboot'

  - name: 'Deploy /etc/systemd/system/notify-and-schedule.service'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/notify-and-schedule.service.j2'
      dest: '/etc/systemd/system/notify-and-schedule.service'
      owner: 'root'
      group: 'root'
      mode: 0o644
    register: '__system_update__notify_service_result'

  - name: 'Deploy /etc/systemd/system/notify-and-schedule.timer'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/notify-and-schedule.timer.j2'
      dest: '/etc/systemd/system/notify-and-schedule.timer'
      owner: 'root'
      group: 'root'
      mode: 0o644
    register: '__system_update__notify_timer_result'

  - name: 'Deploy /etc/systemd/system/update-and-reboot.service'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/update-and-reboot.service.j2'
      dest: '/etc/systemd/system/update-and-reboot.service'
      owner: 'root'
      group: 'root'
      mode: 0o644
    register: '__system_update__update_service_result'

  - name: 'Deploy /etc/systemd/system/update-and-reboot.timer'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/update-and-reboot.timer.j2'
      dest: '/etc/systemd/system/update-and-reboot.timer'
      owner: 'root'
      group: 'root'
      mode: 0o644
    register: '__system_update__update_timer_result'

  tags:
    - 'system_update'


# Security lane (Rocky Linux only): applies security hot-fixes from the dedicated
# `security` repository at the window and drops a reboot request into the shared spool.
- block:

  - name: 'Deploy /usr/local/sbin/security-update'
    ansible.builtin.template:
      backup: true
      src: 'usr/local/sbin/security-update.j2'
      dest: '/usr/local/sbin/security-update'
      owner: 'root'
      group: 'root'
      mode: 0o744

  - name: 'Deploy /etc/systemd/system/security-update.service'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/security-update.service.j2'
      dest: '/etc/systemd/system/security-update.service'
      owner: 'root'
      group: 'root'
      mode: 0o644
    register: '__system_update__security_service_result'

  - name: 'Deploy /etc/systemd/system/security-update.timer'
    ansible.builtin.template:
      backup: true
      src: 'etc/systemd/system/security-update.timer.j2'
      dest: '/etc/systemd/system/security-update.timer'
      owner: 'root'
      group: 'root'
      mode: 0o644
    register: '__system_update__security_timer_result'

  when:
    - 'ansible_facts["distribution"] == "Rocky"'

  tags:
    - 'system_update'


- block:

  # run daemon-reload as a regular task (not a handler) before the state block, so the
  # enable/start tasks act on the freshly deployed units. gated on any unit-file change
  # (service or timer, regular or security) to stay idempotent. skipped Rocky tasks
  # register a non-changed result, so referencing them on non-Rocky hosts is safe.
  - name: 'systemctl daemon-reload'
    ansible.builtin.systemd:
      daemon_reload: true
    when:
      - '__system_update__notify_service_result is changed or
         __system_update__notify_timer_result is changed or
         __system_update__update_service_result is changed or
         __system_update__update_timer_result is changed or
         __system_update__security_service_result is changed or
         __system_update__security_timer_result is changed'

  - name: 'systemctl {{ system_update__update_enabled | bool | ternary("enable", "disable") }} notify-and-schedule.timer --now'
    ansible.builtin.systemd:
      name: 'notify-and-schedule.timer'
      state: '{{ system_update__update_enabled | bool | ternary("started", "stopped") }}'
      enabled: '{{ system_update__update_enabled }}'

  - name: 'systemctl {{ system_update__update_enabled | bool | ternary("enable", "disable") }} update-and-reboot.timer --now'
    ansible.builtin.systemd:
      name: 'update-and-reboot.timer'
      state: '{{ system_update__update_enabled | bool | ternary("started", "stopped") }}'
      enabled: '{{ system_update__update_enabled }}'

  tags:
    - 'system_update'
    - 'system_update:state'


- block:

  - name: 'systemctl {{ system_update__security_enabled | bool | ternary("enable", "disable") }} security-update.timer --now'
    ansible.builtin.systemd:
      name: 'security-update.timer'
      state: '{{ system_update__security_enabled | bool | ternary("started", "stopped") }}'
      enabled: '{{ system_update__security_enabled }}'

  when:
    - 'ansible_facts["distribution"] == "Rocky"'

  tags:
    - 'system_update'
    - 'system_update:state'
