- block:

  - name: 'Install keepalived'
    ansible.builtin.package:
      name:
        - 'keepalived'
      state: 'present'

  - name: 'Deploy /etc/keepalived/keepalived.conf'
    ansible.builtin.template:
      backup: true
      src: 'etc/keepalived/keepalived.conf.j2'
      dest: '/etc/keepalived/keepalived.conf'
      owner: 'root'
      group: 'root'
      mode: 0o644
    notify: 'keepalived: restart keepalived'

  - name: 'Remove rpmnew / rpmsave (and Debian equivalents)'
    ansible.builtin.include_role:
      name: 'shared'
      tasks_from: 'remove-rpmnew-rpmsave.yml'
    vars:
      shared__remove_rpmnew_rpmsave_config_file: '/etc/keepalived/keepalived.conf'

  tags:
    - 'keepalived'


- block:

  - name: 'systemctl {{ keepalived__service_enabled | bool | ternary("enable", "disable") }} keepalived.service'
    ansible.builtin.systemd:
      name: 'keepalived.service'
      enabled: '{{ keepalived__service_enabled }}'

  - name: 'systemctl {{ keepalived__service_state | regex_replace("p?ed$", "") }} keepalived.service'
    ansible.builtin.systemd:
      name: 'keepalived.service'
      state: '{{ keepalived__service_state }}'
    register: '__keepalived__service_state_result'

  tags:
    - 'keepalived'
    - 'keepalived:state'
