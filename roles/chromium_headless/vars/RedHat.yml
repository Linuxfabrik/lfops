__chromium_headless__binary_path: '/usr/lib64/chromium-browser/headless_shell'
__chromium_headless__packages:
  - 'chromium-headless'
  - 'gnu-free-sans-fonts'
# systemd-socket-proxyd --exit-idle-time (systemd 246+) is available on EL9 and newer; EL8 overrides this to false in RedHat8.yml.
__chromium_headless__proxy_exit_idle_time_supported: true
