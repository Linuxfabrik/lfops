argument_specs:
  main:
    options:

      chromium_headless__backend_port:
        type: 'int'
        required: false
        default: 9223
        description: 'Internal port Chromium itself listens on. The proxy forwards traffic from listen_port to this port.'

      chromium_headless__extra_args__dependent_var:
        type: 'list'
        elements: 'dict'
        required: false
        default: []
        description: 'Extra Chromium CLI flags. Dependent-role injection.'

      chromium_headless__extra_args__group_var:
        type: 'list'
        elements: 'dict'
        required: false
        default: []
        description: 'Extra Chromium CLI flags. Group-level override.'

      chromium_headless__extra_args__host_var:
        type: 'list'
        elements: 'dict'
        required: false
        default: []
        description: 'Extra Chromium CLI flags. Host-level override.'

      chromium_headless__idle_timeout:
        type: 'int'
        required: false
        default: 300
        description: 'Seconds the systemd-socket-proxyd waits without traffic before exiting (and stopping Chromium via BindsTo).'

      chromium_headless__listen_address:
        type: 'str'
        required: false
        default: '127.0.0.1'
        description: 'Listen address for the Chromium remote debugging interface.'

      chromium_headless__listen_port:
        type: 'int'
        required: false
        default: 9222
        description: 'Listen port for the Chromium remote debugging interface.'

      chromium_headless__service_enabled:
        type: 'bool'
        required: false
        default: true
        description: 'Enables or disables the chromium-headless-proxy.socket unit at boot. The Chromium service itself is triggered on demand by the proxy and is not managed directly.'

      chromium_headless__service_state:
        type: 'str'
        required: false
        default: 'started'
        choices:
          - 'reloaded'
          - 'restarted'
          - 'started'
          - 'stopped'
        description: 'Desired state of the chromium-headless-proxy.socket unit. The Chromium service itself is triggered on demand by the proxy and is not managed directly.'

      chromium_headless__user_data_dir:
        type: 'str'
        required: false
        default: '/var/lib/chromium-headless'
        description: 'Home directory of the chromium system user and Chromium user data directory.'
